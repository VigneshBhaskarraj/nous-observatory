<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Evolution Tree — Nous Observatory</title>
<style>
:root {
  --bg: #c8e8d8;
  --pc: #c0622f;
  --pc-dim: #7a3418;
  --pc-light: #f4a87a;
  --pc-glow: rgba(192,98,47,0.3);
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#a8d8f0 0%,#c8eaf8 22%,#d8f0e0 55%,#9ecf80 100%);
  color:#2d1a0a;
  display:flex; flex-direction:column;
  transition: background 0.8s;
}

/* ── HEADER ── */
.hdr {
  flex-shrink:0;
  background:rgba(255,252,240,0.90); border-bottom:1px solid rgba(90,140,60,0.22);
  padding:9px 24px; display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(14px); z-index:200; position:relative;
  box-shadow:0 1px 6px rgba(45,74,26,.07);
}
.hdr-left { display:flex; align-items:center; gap:14px; }
.hdr-title { font-size:15px; font-weight:800; letter-spacing:-.3px; color:#2a4a18; }
.hdr-sub   { font-size:11px; color:#6a8a5a; }
.hdr-links { display:flex; gap:12px; }
.hdr-link  { font-size:11px; color:#2d6ea8; text-decoration:none; opacity:.7; transition:opacity .2s; }
.hdr-link:hover { opacity:1; }

/* ── PROVIDER TABS ── */
.ptabs {
  flex-shrink:0; display:flex; justify-content:center; gap:10px;
  padding:10px 0 5px; position:relative; z-index:10;
}
.ptab {
  padding:5px 24px; border-radius:20px; border:1.5px solid;
  font-size:11px; font-weight:700; cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  background:rgba(255,255,255,0.55); opacity:.5; transform:scale(.95);
}
.ptab.on { opacity:1; transform:scale(1); }
.ptab.ant { border-color:#c0622f; color:#c0622f; }
.ptab.ant.on { background:rgba(192,98,47,.1); box-shadow:0 2px 14px rgba(192,98,47,.22); }
.ptab.oai { border-color:#1d8a52; color:#1d8a52; }
.ptab.oai.on { background:rgba(29,138,82,.1); box-shadow:0 2px 14px rgba(29,138,82,.22); }
.ptab.goo { border-color:#3a85c8; color:#3a85c8; }
.ptab.goo.on { background:rgba(58,133,200,.1); box-shadow:0 2px 14px rgba(58,133,200,.22); }

/* ── MAIN STAGE ── */
.stage { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
#particle-canvas { position:absolute; inset:0; pointer-events:none; z-index:1; }
#tree-svg { position:relative; z-index:2; width:100%; height:100%; cursor:default; transition:filter .4s; }
#tree-svg.zoomed { cursor:zoom-out; }

.zoom-hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:10px; color:rgba(45,74,26,0.45); z-index:5; pointer-events:none;
  transition:opacity .4s; font-style:italic;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  flex-shrink:0;
  background:rgba(255,253,242,0.97);
  border-top:2px solid rgba(90,140,60,0.22);
  padding:0; max-height:0; overflow:hidden;
  transition: max-height .45s cubic-bezier(.4,0,.2,1), padding .45s;
  backdrop-filter:blur(16px); z-index:50; position:relative;
  box-shadow:0 -4px 20px rgba(45,74,26,.08);
}
.detail-panel.open { max-height:320px; padding:12px 22px; }
.detail-inner { overflow-y:auto; max-height:292px; display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap; }
.detail-name  { font-size:17px; font-weight:800; line-height:1; color:#2d1a0a; }
.detail-api   { font-size:10px; color:#8a7a6a; font-family:monospace; margin-top:3px; }
.detail-tier  { font-size:10px; font-weight:700; padding:2px 9px; border-radius:10px; border:1px solid; margin-top:5px; display:inline-block; }
.detail-stats { display:flex; gap:8px; flex-wrap:wrap; }
.dstat        { background:rgba(90,140,60,.08); border:1px solid rgba(90,140,60,.15); border-radius:8px; padding:7px 12px; min-width:76px; }
.dstat-val    { font-size:15px; font-weight:700; }
.dstat-lbl    { font-size:9px; color:#7a8a6a; text-transform:uppercase; letter-spacing:.4px; margin-top:1px; }
.detail-feats { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.dfeat        { font-size:10px; padding:2px 8px; border-radius:11px; background:rgba(90,140,60,.1); color:#3a5a2a; border:1px solid rgba(90,140,60,.2); white-space:nowrap; }
.close-btn    { margin-left:auto; background:none; border:none; color:#9aaa8a; cursor:pointer; font-size:17px; padding:4px; line-height:1; transition:color .2s; align-self:flex-start; flex-shrink:0; }
.close-btn:hover { color:#2d1a0a; }

/* ── USE CASE SECTION ── */
.usecase-section { border-top:1px solid rgba(90,140,60,.18); padding-top:9px; margin-top:8px; min-width:190px; flex:1; }
.usecase-title { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:#6a8a5a; font-weight:700; margin-bottom:7px; }
.uc-grid { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:7px; }
.uc-chip { font-size:10px; padding:3px 9px; border-radius:11px; font-weight:600; white-space:nowrap; }
.uc-code     { background:#dbeafe; color:#1e40af; }
.uc-reason   { background:#d1fae5; color:#065f46; }
.uc-write    { background:#fef3c7; color:#92400e; }
.uc-analysis { background:#ede9fe; color:#5b21b6; }
.uc-agent    { background:#fee2e2; color:#991b1b; }
.uc-speed    { background:#ecfdf5; color:#065f46; }
.uc-vision   { background:#e0f2fe; color:#0369a1; }
.choose-when { font-size:10px; color:#3a5a2a; line-height:1.5; border-left:2px solid rgba(90,140,60,.35); padding-left:8px; margin-bottom:4px; }
.skip-if     { font-size:10px; color:#7a5a3a; line-height:1.5; border-left:2px solid rgba(192,98,47,.3); padding-left:8px; font-style:italic; }

/* ── MILESTONE LIST ── */
.mile-section { border-top:1px solid rgba(90,140,60,.18); padding-top:9px; margin-top:8px; flex:1; min-width:240px; }
.mile-section-title { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:#6a8a5a; font-weight:700; margin-bottom:6px; }
.mile-list { display:flex; flex-direction:column; gap:4px; max-height:130px; overflow-y:auto; padding-right:3px; }
.mile-list::-webkit-scrollbar { width:3px; }
.mile-list::-webkit-scrollbar-track { background:transparent; }
.mile-list::-webkit-scrollbar-thumb { background:rgba(90,140,60,.3); border-radius:3px; }
.mile-item { background:rgba(90,140,60,.05); border-radius:6px; padding:5px 8px; border-left:2px solid; cursor:default; transition:background .15s; }
.mile-item:hover { background:rgba(90,140,60,.1); }
.mile-date  { font-size:9px; color:#8a9a7a; margin-bottom:1px; }
.mile-evt   { font-size:10px; color:#2d3a2a; line-height:1.4; }
.mile-sig   { font-size:9px; color:#5a7a4a; margin-top:2px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.mile-chips { display:flex; gap:3px; flex-wrap:wrap; margin-top:3px; }
.mile-chip  { font-size:9px; padding:1px 5px; border-radius:7px; background:rgba(90,140,60,.1); color:#4a6a3a; }
.mile-loading { color:#8a9a7a; font-size:10px; padding:6px 0; }

/* ── TOOLTIP ── */
.tooltip {
  position:fixed; background:rgba(255,253,240,.97);
  border:1px solid rgba(90,140,60,.25); border-radius:8px; padding:6px 11px; font-size:11px;
  pointer-events:none; z-index:300; opacity:0; transition:opacity .15s;
  backdrop-filter:blur(8px); max-width:180px; box-shadow:0 4px 12px rgba(45,74,26,.12);
  color:#2d1a0a;
}
.tooltip.show { opacity:1; }
.tt-name { font-weight:700; margin-bottom:2px; color:#2d1a0a; }
.tt-year { color:#8a9a7a; font-size:10px; }

/* ── ANIMATIONS ── */
@keyframes breathe {
  0%,100% { transform:scale(1); opacity:1; }
  50%      { transform:scale(1.08); opacity:.85; }
}
@keyframes ripple-out {
  0%   { r:6px;  opacity:.7; stroke-width:2; }
  100% { r:40px; opacity:0;  stroke-width:0.5; }
}
@keyframes feat-pop {
  0%   { transform:scale(0) translate(-50%,-50%); opacity:0; }
  60%  { transform:scale(1.15) translate(-50%,-50%); opacity:1; }
  100% { transform:scale(1) translate(-50%,-50%); opacity:1; }
}
@keyframes leaf-sway {
  0%,100% { transform:rotate(-4deg); }
  50%      { transform:rotate(4deg); }
}
</style>
</head>

//  SUPABASE — live milestones

const SB  = 'https://yjupiuxuoxmycehkbmwl.supabase.co';
const KEY = 'sb_publishable_RUyNAQRYQq37O0IvOJ9kbQ_Cj8V0Yrr';
const SBH = { apikey:KEY, Authorization:'Bearer '+KEY };
const _provNameMap = { anthropic:'Anthropic', openai:'OpenAI', google:'Google DeepMind' };
let _entCache = {};   // name → entity object
let _mileCache = {};  // entityId → milestones[]

async function sbGet(table, qs) {
  const r = await fetch(`${SB}/rest/v1/${table}?${qs}`, { headers:SBH });
  if (!r.ok) return [];
  return r.json();
}

async function getEntityId(provKey) {
  const name = _provNameMap[provKey];
  if (_entCache[name]) return _entCache[name].id;
  const rows = await sbGet('entities', `select=id,name&name=eq.${encodeURIComponent(name)}&limit=1`);
  if (rows[0]) _entCache[name] = rows[0];
  return rows[0]?.id || null;
}

async function getMilestones(provKey) {
  const id = await getEntityId(provKey);
  if (!id) return [];
  if (_mileCache[id]) return _mileCache[id];
  const rows = await sbGet('milestones',
    `select=date,event,significance,strategic_signal,forward_implication_score,claim_type,stack_layer,tags`+
    `&entity_id=eq.${id}&order=date.desc&limit=40`);
  _mileCache[id] = rows;
  return rows;
}

function claimColor(ct) {
  return ct==='demonstrated'?'#10b981':ct==='announced'?'#3b82f6':'#f59e0b';
}

function el(tag, attrs={}, parent=null){
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  if(parent) parent.appendChild(e);

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  const stage = document.getElementById('stage');
  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
}

// Daylight particle palette: pollen + floating petals + butterflies
class Particle {
  constructor(type){ this.type=type; this.reset(true); }
  reset(init=false){
    if(this.type==='pollen'){
      this.x = 40+Math.random()*(canvas.width-80);
      this.y = init ? Math.random()*canvas.height : canvas.height*0.85+Math.random()*40;
      this.vy = -(0.3+Math.random()*0.5);
      this.vx = (Math.random()-.5)*0.4;
      this.size = 1.2+Math.random()*1.8;
      this.alpha = 0; this.targetAlpha = 0.35+Math.random()*0.55;
      this.t = Math.random()*Math.PI*2;
      this.wobble = 0.02+Math.random()*0.02;
    } else if(this.type==='petal'){
      this.x = 60+Math.random()*(canvas.width-120);
      this.y = init ? Math.random()*canvas.height*0.7 : -12;
      this.vx = (Math.random()-.5)*0.7;
      this.vy = 0.35+Math.random()*0.6;
      this.rot = Math.random()*360; this.rotSpd=(Math.random()-.5)*1.2;
      this.w = 5+Math.random()*6; this.h = (3+Math.random()*4);
      this.alpha = 0.5+Math.random()*0.4;
      this.swing = Math.random()*Math.PI*2; this.swingSpd=0.025+Math.random()*0.02;
      // petal colour: pale green, yellow, cream, soft pink
      const cols=['rgba(180,220,140','rgba(240,210,100','rgba(255,240,200','rgba(230,190,180'];
      this.color = cols[Math.floor(Math.random()*cols.length)];
    } else { // butterfly
      this.x = 60+Math.random()*(canvas.width-120);
      this.y = 40+Math.random()*(canvas.height*0.7);
      this.vx = (Math.random()-.5)*0.5; this.vy=(Math.random()-.5)*0.3;
      this.t = Math.random()*Math.PI*2; this.speed=0.02+Math.random()*0.02;
      this.flapT = Math.random()*Math.PI*2; this.flapSpd=0.12+Math.random()*0.08;
      this.size = 6+Math.random()*5;
      this.alpha = 0.5+Math.random()*0.4;
      const bCols=[['#f97316','#7c2d12'],['#84cc16','#365314'],['#38bdf8','#0c4a6e'],['#f0abfc','#701a75']];
      this.colors = bCols[Math.floor(Math.random()*bCols.length)];
    }
  }
  update(){
    const t=TREES[currentProvider];
    if(this.type==='pollen'){
      this.t+=this.wobble;
      this.x+=this.vx+Math.sin(this.t)*0.5;
      this.y+=this.vy;
      this.alpha+=(this.targetAlpha-this.alpha)*0.03;
      if(Math.random()<0.004) this.targetAlpha=0.1+Math.random()*0.6;
      if(this.y<-10) this.reset();
    } else if(this.type==='petal'){
      this.swing+=this.swingSpd;
      this.x+=this.vx+Math.sin(this.swing)*0.5;
      this.y+=this.vy;
      this.rot+=this.rotSpd;
      if(this.y>canvas.height+15) this.reset();
    } else {
      this.t+=this.speed;
      this.flapT+=this.flapSpd;
      this.x+=this.vx+Math.sin(this.t)*0.8;
      this.y+=this.vy+Math.cos(this.t*0.6)*0.4;
      if(this.x<-20||this.x>canvas.width+20||this.y<-20||this.y>canvas.height+20) this.reset();
    }
  }
  draw(){
    const t=TREES[currentProvider];
    ctx.save(); ctx.globalAlpha=this.alpha;
    if(this.type==='pollen'){
      // Soft golden glow dot
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*3.5);
      g.addColorStop(0,'rgba(255,220,80,0.9)'); g.addColorStop(0.4,'rgba(255,180,40,0.5)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*3.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,240,160,0.9)';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*0.5,0,Math.PI*2); ctx.fill();
    } else if(this.type==='petal'){
      ctx.translate(this.x,this.y); ctx.rotate(this.rot*Math.PI/180);
      ctx.beginPath();
      ctx.moveTo(0,-this.h);
      ctx.bezierCurveTo(this.w,-this.h,this.w,this.h*0.3,0,this.h);
      ctx.bezierCurveTo(-this.w,this.h*0.3,-this.w,-this.h,0,-this.h);
      ctx.fillStyle=this.color+',0.7)'; ctx.fill();
      ctx.strokeStyle=this.color+',0.3)'; ctx.lineWidth=0.4; ctx.stroke();
    } else {
      // Butterfly: two curved wings
      const flap=Math.sin(this.flapT)*0.7;
      ctx.translate(this.x,this.y);
      ctx.fillStyle=this.colors[0];
      // Left wing
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-this.size,this.size*flap,-this.size*1.5,-this.size*0.5,-this.size*0.5,-this.size*0.3);
      ctx.bezierCurveTo(-this.size*0.3,-this.size*0.1,0,-this.size*0.2,0,0);
      ctx.fill();
      // Right wing (mirrored)
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(this.size,this.size*flap,this.size*1.5,-this.size*0.5,this.size*0.5,-this.size*0.3);
      ctx.bezierCurveTo(this.size*0.3,-this.size*0.1,0,-this.size*0.2,0,0);
      ctx.fill();
      // Wing detail
      ctx.fillStyle=this.colors[1]; ctx.globalAlpha=this.alpha*0.4;
      ctx.beginPath(); ctx.arc(-this.size*0.5,0,this.size*0.25,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(this.size*0.5,0,this.size*0.25,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<30;i++) particles.push(new Particle('pollen'));
  for(let i=0;i<10;i++) particles.push(new Particle('petal'));
  for(let i=0;i<5;i++)  particles.push(new Particle('butterfly'));
}

function getDepth(nodeMap, id){
  let d=0,cur=id;
  while(nodeMap[cur]?.parent){cur=nodeMap[cur].parent;d++;}
  return d;
}

function drawTree(provKey, animate=true){
  svg.innerHTML='';
  const tree = TREES[provKey];
  const nodes = tree.nodes;
  const nMap={}; nodes.forEach(n=>nMap[n.id]=n);

  // ── CSS vars ──────────────────────────────────────────────
  document.documentElement.style.setProperty('--pc', tree.color);
  document.documentElement.style.setProperty('--pc-dim', tree.dim);
  document.documentElement.style.setProperty('--pc-light', tree.light);
  document.documentElement.style.setProperty('--pc-glow', tree.glow);

  // ── Defs ─────────────────────────────────────────────────
  const defs = el('defs',{},svg);

  // Node glow
  const fg=el('filter',{id:'fg',x:'-80%',y:'-80%',width:'260%',height:'260%'},defs);
  el('feGaussianBlur',{stdDeviation:'5',result:'b',in:'SourceGraphic'},fg);
  const fm=el('feMerge',{},fg);
  el('feMergeNode',{in:'b'},fm); el('feMergeNode',{in:'SourceGraphic'},fm);

  // Strong glow for latest
  const fgS=el('filter',{id:'fgS',x:'-150%',y:'-150%',width:'400%',height:'400%'},defs);
  el('feGaussianBlur',{stdDeviation:'8',result:'b2',in:'SourceGraphic'},fgS);
  const fm2=el('feMerge',{},fgS);
  el('feMergeNode',{in:'b2'},fm2); el('feMergeNode',{in:'SourceGraphic'},fm2);

  // Feather for leaves
  const fLeaf=el('filter',{id:'fLeaf',x:'-60%',y:'-60%',width:'220%',height:'220%'},defs);
  el('feGaussianBlur',{stdDeviation:'1.5',result:'bl',in:'SourceGraphic'},fLeaf);
  const fm3=el('feMerge',{},fLeaf);
  el('feMergeNode',{in:'bl'},fm3); el('feMergeNode',{in:'SourceGraphic'},fm3);

  // Ground radial glow
  const rg=el('radialGradient',{id:'rg',cx:'50%',cy:'100%',r:'40%'},defs);
  el('stop',{offset:'0%','stop-color':tree.color,'stop-opacity':'0.12'},rg);
  el('stop',{offset:'100%','stop-color':tree.color,'stop-opacity':'0'},rg);

  // Branch gradient (bark brown root → provider colour at tips)
  const bg=el('linearGradient',{id:'bgrad',x1:'0',y1:'1',x2:'0',y2:'0'},defs);
  el('stop',{offset:'0%','stop-color':'#6b3c18'},bg);
  el('stop',{offset:'35%','stop-color':'#8b5220'},bg);
  el('stop',{offset:'100%','stop-color':tree.color},bg);

  // ── Background: nature meadow scene ─────────────────────────
  // Sky gradient
  const skyG=el('linearGradient',{id:'skyG',x1:'0',y1:'0',x2:'0',y2:'1'},defs);
  el('stop',{offset:'0%','stop-color':'#a8d8f0'},skyG);
  el('stop',{offset:'55%','stop-color':'#c8eaf8'},skyG);
  el('stop',{offset:'100%','stop-color':'#d8f0e0'},skyG);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#skyG)'},svg);

  // Sun glow (upper-right)
  const sunG=el('radialGradient',{id:'sunG',cx:'78%',cy:'8%',r:'28%'},defs);
  el('stop',{offset:'0%','stop-color':'#fffde8','stop-opacity':'0.9'},sunG);
  el('stop',{offset:'40%','stop-color':'#fef3c7','stop-opacity':'0.35'},sunG);
  el('stop',{offset:'100%','stop-color':'#c8eaf8','stop-opacity':'0'},sunG);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#sunG)'},svg);

  // Sun disc
  el('circle',{cx:655,cy:44,r:22,fill:'#fff7c0',opacity:'0.75'},svg);
  el('circle',{cx:655,cy:44,r:14,fill:'#ffec8b',opacity:'0.85'},svg);

  // Clouds
  const clouds=[[100,55,60,22],[260,38,80,24],[490,30,90,26],[680,62,55,18]];
  clouds.forEach(([cx,cy,rx,ry])=>{
    el('ellipse',{cx,cy,rx,ry,fill:'#fff',opacity:'0.72'},svg);
    el('ellipse',{cx:cx-rx*0.3,cy:cy+4,rx:rx*0.6,ry:ry*0.7,fill:'#fff',opacity:'0.55'},svg);
    el('ellipse',{cx:cx+rx*0.3,cy:cy+3,rx:rx*0.5,ry:ry*0.65,fill:'#fff',opacity:'0.5'},svg);
  });

  // Distant hills
  const hillPath=`M0,390 Q100,350 200,370 Q320,340 440,365 Q560,335 680,360 Q750,345 820,355 L820,540 L0,540 Z`;
  const hillG=el('linearGradient',{id:'hillG',x1:'0',y1:'0',x2:'0',y2:'1'},defs);
  el('stop',{offset:'0%','stop-color':'#6aaa55'},hillG);
  el('stop',{offset:'100%','stop-color':'#4a8a35'},hillG);
  el('path',{d:hillPath,fill:'url(#hillG)',opacity:'0.55'},svg);

  // Ground / meadow
  const meadowG=el('linearGradient',{id:'meadowG',x1:'0',y1:'0',x2:'0',y2:'1'},defs);
  el('stop',{offset:'0%','stop-color':'#7ebe5a'},meadowG);
  el('stop',{offset:'100%','stop-color':'#4a8c35'},meadowG);
  el('rect',{x:0,y:462,width:820,height:78,fill:'url(#meadowG)'},svg);

  // Grass blade texture at very bottom
  for(let i=0;i<40;i++){
    const gx=10+i*20+Math.sin(i*2.1)*5;
    el('path',{d:`M${gx},540 Q${gx-4},524 ${gx+2},514`,
      stroke:'#3a7a28','stroke-width':'1.5',fill:'none',opacity:'0.5','stroke-linecap':'round'},svg);
    el('path',{d:`M${gx+8},540 Q${gx+14},520 ${gx+10},510`,
      stroke:'#4a8c35','stroke-width':'1',fill:'none',opacity:'0.4','stroke-linecap':'round'},svg);
  }

  // Distant birds (tiny V-shapes in sky)
  const birds=[[120,80],[180,65],[195,72],[340,52],[355,60],[600,45],[612,52]];
  birds.forEach(([bx,by])=>{
    el('path',{d:`M${bx-5},${by} Q${bx},${by-3} ${bx+5},${by}`,
      stroke:'#5a8a9a','stroke-width':'1',fill:'none',opacity:'0.4'},svg);
  });

  // Ground glow under tree
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#rg)'},svg);

  // ── Groups ────────────────────────────────────────────────
  const gBranches  = el('g',{id:'branches'},svg);
  const gPathTrace = el('g',{id:'path-trace'},svg);
  const gRipples   = el('g',{id:'ripples'},svg);
  const gLeaves    = el('g',{id:'leaf-clusters'},svg);
  const gNodes     = el('g',{id:'nodes'},svg);
  const gFeatChips = el('g',{id:'feat-chips'},svg);

  // ── Ground ───────────────────────────────────────────────
  el('ellipse',{cx:410,cy:524,rx:56,ry:9,fill:tree.color,opacity:'0.12'},gBranches);
  // Root hairs
  for(let i=0;i<7;i++){
    const rx=410+(i-3)*18+Math.sin(i*1.7)*8;
    const ry=524+Math.abs(Math.sin(i*0.9))*12;
    el('line',{x1:410,y1:524,x2:rx,y2:ry,
      stroke:tree.dim,'stroke-width':'1.5',opacity:'0.5','stroke-linecap':'round'},gBranches);
  }

  // ── Branches ─────────────────────────────────────────────
  const branchEls=[];
  const branchNodes=nodes.filter(n=>n.parent).sort((a,b)=>getDepth(nMap,a.id)-getDepth(nMap,b.id));

  branchNodes.forEach(n=>{
    const p=nMap[n.parent];
    const depth=getDepth(nMap,n.id);
    const swMap=[12,8,5.5,4,3,2.5];
    const sw=swMap[Math.min(depth,swMap.length-1)];

    const dx=n.x-p.x, dy=n.y-p.y;
    const cp1x=p.x+dx*0.15, cp1y=p.y+dy*0.42;
    const cp2x=p.x+dx*0.82, cp2y=p.y+dy*0.58;
    const d=`M${p.x} ${p.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${n.x} ${n.y}`;

    // Shadow
    el('path',{d,fill:'none',stroke:'#000','stroke-width':sw+3,
      'stroke-linecap':'round',opacity:'0.6'},gBranches);
    // Main
    const bEl=el('path',{d,fill:'none',stroke:'url(#bgrad)',
      'stroke-width':sw,'stroke-linecap':'round',
      opacity: n.isLatest?'0.95':'0.78',
      'data-branch':n.id},gBranches);

    // Animate growth
    if(animate){
      try {
        const len=bEl.getTotalLength();
        bEl.style.strokeDasharray=len;
        bEl.style.strokeDashoffset=len;
        const delay=depth*180+Math.random()*80;
        bEl.style.transition=`stroke-dashoffset ${0.6+depth*0.12}s ease-out ${delay}ms`;
        requestAnimationFrame(()=>{ bEl.style.strokeDashoffset='0'; });
      } catch(e){}
    }
    branchEls.push({el:bEl,nodeId:n.id});
  });

  // ── Leaf clusters on terminal nodes ──────────────────────
  const childIds=new Set(nodes.filter(n=>n.parent).map(n=>n.parent));
  const terminals=nodes.filter(n=>!childIds.has(n.id)&&n.id!=='root');

  terminals.forEach(n=>{
    const leafG=el('g',{'data-leaf-for':n.id},gLeaves);
    const cnt=8+Math.floor(Math.random()*5);
    for(let i=0;i<cnt;i++){
      const ang=((i/cnt)*Math.PI*1.6-Math.PI*1.1);
      const dist=18+i%3*9;
      const lx=n.x+Math.cos(ang)*dist;
      const ly=n.y+Math.sin(ang)*dist-6;
      const rot=ang*180/Math.PI+90;
      const lw=5+i%3*2, lh=lw*0.55;
      // Bodhi-style heart leaf
      const lp=el('path',{
        d:`M0,${-lh} C${lw},${-lh} ${lw},${lh*0.4} 0,${lh} C${-lw},${lh*0.4} ${-lw},${-lh} 0,${-lh}`,
        fill:`hsl(${120+i*8},${60+i*3}%,${50+i*2}%)`,
        opacity:(0.45+i%3*0.15).toString(),
        transform:`translate(${lx},${ly}) rotate(${rot})`,
        filter:'url(#fLeaf)',
        style:`animation:leaf-sway ${2.5+i*0.3}s ease-in-out ${i*0.2}s infinite`
      },leafG);
    }
  });

  // ── Nodes ────────────────────────────────────────────────
  nodes.forEach(n=>{
    const isRoot=n.id==='root';
    const isLatest=n.isLatest;
    const isTerm=!childIds.has(n.id)&&!isRoot;
    const depth=getDepth(nMap,n.id);
    const nodeG=el('g',{
      transform:`translate(${n.x},${n.y})`,
      style:'cursor:pointer',
      'data-nid':n.id
    },gNodes);

    // Outer pulse ring (latest nodes)
    if(isLatest){
      const ring=el('circle',{cx:0,cy:0,r:n.r+8,fill:'none',
        stroke:tree.light,'stroke-width':'1',
        opacity:'0.35',
        style:`animation:leaf-sway ${2+n.r*0.1}s ease-in-out infinite`},nodeG);
      const ring2=el('circle',{cx:0,cy:0,r:n.r+16,fill:'none',
        stroke:tree.light,'stroke-width':'0.5',opacity:'0.15'},nodeG);
    }

    // Node body — cream/ivory fills on nature background
    const fillC = isRoot   ? '#6b3c18' :
                  isLatest ? tree.color :
                  depth<=1 ? '#f9f3e8' :
                  depth<=2 ? '#f4efe0' : '#efe8d8';
    const strokeC = isLatest ? tree.color : isRoot ? tree.light : tree.color;
    const strokeW = isLatest ? '2.5' : isRoot ? '2' : '1.5';
    el('circle',{cx:0,cy:0,r:n.r,fill:fillC,stroke:strokeC,
      'stroke-width':strokeW,
      filter: isLatest?'url(#fgS)':'url(#fg)',
      style: isTerm?`animation:breathe ${2.5+depth*0.2}s ease-in-out ${n.x%1.5}s infinite`:''
    },nodeG);

    // Inner accent dot
    if(!isRoot){
      el('circle',{cx:0,cy:0,r:Math.max(2,n.r-5),
        fill: tree.color,
        opacity: isLatest ? '0.5':'0.25'},nodeG);
    }

    // Label above node — dark text, readable on light background
    const lines=n.label.split('\n');
    lines.forEach((line,idx)=>{
      const offset = lines.length>1 ? (idx===0?-(n.r+12):-(n.r+4)) : -(n.r+9);
      const t=el('text',{x:0,y:offset,'text-anchor':'middle',
        'font-size': isRoot?'9':'8',
        'font-weight': isLatest||isRoot?'800':'600',
        fill: isRoot?'#f9f3e8': isLatest?tree.dim:'#2d1a0a',
        'paint-order':'stroke',
        stroke: isRoot?tree.dim:'rgba(255,253,240,0.85)',
        'stroke-width':'2.5','stroke-linejoin':'round'
      },nodeG);
      t.textContent=line;
    });

    // Year below
    if(!isRoot){
      const yt=el('text',{x:0,y:n.r+11,'text-anchor':'middle',
        'font-size':'7.5', fill:'#7a6a5a'
      },nodeG);
      yt.textContent=n.sub.split('·')[0].trim();
    }

    // ── Events ────────────────────────────────────────────
    nodeG.addEventListener('mouseenter', e=>{
      document.getElementById('tt-name').textContent=n.label.replace('\n',' ');
      document.getElementById('tt-year').textContent=(n.api||'')+' · '+n.sub;
      const tt=document.getElementById('tooltip');
      tt.style.setProperty('border-color',tree.color);
      tt.classList.add('show');
      // Highlight path
      highlightPath(n.id, tree, nMap);
    });
    nodeG.addEventListener('mousemove', e=>{
      const tt=document.getElementById('tooltip');
      tt.style.left=(e.clientX+15)+'px';
      tt.style.top=(e.clientY-8)+'px';
    });
    nodeG.addEventListener('mouseleave', ()=>{
      document.getElementById('tooltip').classList.remove('show');
      clearPathHighlight();
    });
    nodeG.addEventListener('click', e=>{
      e.stopPropagation();
      if(selectedNodeId===n.id && isZoomed){ zoomOut(); return; }
      selectedNodeId=n.id;
      ripple(n.x, n.y, tree.color, gRipples);
      if(!n.id||n.id!=='root') zoomToNode(n);
      showFeatChips(n, tree, nMap, gFeatChips);
      showDetail(n, tree);  // async — renders panel immediately, then fills milestones
    });
  });

  // Click background to zoom out
  svg.addEventListener('click', ()=>{ if(isZoomed) zoomOut(); });

  // Title
  const titleEl=el('text',{x:806,y:22,'text-anchor':'end','font-size':'12',
    'font-weight':'700',fill:tree.color,opacity:'0.5'},svg);
  titleEl.textContent=tree.name+' · Evolution Tree';
}

// ═══════════════════════════════════════════════════════════
//  PATH HIGHLIGHT
// ═══════════════════════════════════════════════════════════
function getPathToRoot(nodeId, nMap){
  const path=[]; let cur=nodeId;
  while(nMap[cur]){path.push(nMap[cur]); cur=nMap[cur].parent; if(!cur) break;}
  return path;
}

function highlightPath(nodeId, tree, nMap){
  clearPathHighlight();
  const pathNodes=getPathToRoot(nodeId, nMap);
  const g=document.getElementById('path-trace');
  if(!g) return;

  for(let i=1;i<pathNodes.length;i++){
    const child=pathNodes[i-1], par=pathNodes[i];
    const dx=child.x-par.x, dy=child.y-par.y;
    const cp1x=par.x+dx*.15, cp1y=par.y+dy*.42;
    const cp2x=par.x+dx*.82, cp2y=par.y+dy*.58;
    const d=`M${par.x} ${par.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${child.x} ${child.y}`;

    const glow=el('path',{d,fill:'none',stroke:tree.light,'stroke-width':'6',
      'stroke-linecap':'round',opacity:'0.35',class:'path-trace-el'},g);
    const bright=el('path',{d,fill:'none',stroke:'#fff','stroke-width':'2',
      'stroke-linecap':'round',opacity:'0.6',class:'path-trace-el'},g);

    try {
      const len=glow.getTotalLength();
      [glow,bright].forEach(pe=>{
        pe.style.strokeDasharray=len; pe.style.strokeDashoffset=len;
        pe.style.transition=`stroke-dashoffset 0.35s ease-out ${(i-1)*80}ms`;
        requestAnimationFrame(()=>{ pe.style.strokeDashoffset='0'; });
      });
    } catch(e){}
  }
}

function clearPathHighlight(){
  const g=document.getElementById('path-trace');
  if(g) g.innerHTML='';
}

// ═══════════════════════════════════════════════════════════
//  RIPPLE
// ═══════════════════════════════════════════════════════════
function ripple(x, y, color, group){
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const c=el('circle',{cx:x,cy:y,r:'6',fill:'none',stroke:color,
        'stroke-width':'2',opacity:'0.9'},group);
      c.animate([
        {r:'6px',opacity:'0.8','stroke-width':'2px'},
        {r:'45px',opacity:'0','stroke-width':'0.5px'}
      ],{duration:700+i*150,easing:'ease-out',fill:'forwards'})
      .onfinish=()=>c.remove();
    },i*120);
  }
}

// ═══════════════════════════════════════════════════════════
//  FEATURE CHIPS RADIATE FROM NODE
// ═══════════════════════════════════════════════════════════
function showFeatChips(node, tree, nMap, group){
  group.innerHTML='';
  const feats=TREES[currentProvider].feats?.[node.id]||[];
  if(!feats.length) return;

  const count=feats.length;
  feats.forEach((feat,i)=>{
    const angle=(i/(count))*(Math.PI*1.2)-Math.PI*1.1;
    const dist=75+Math.floor(i/4)*30;
    const tx=node.x+Math.cos(angle)*dist;
    const ty=node.y+Math.sin(angle)*dist;

    const chipG=el('g',{transform:`translate(${node.x},${node.y})`,opacity:'0'},group);

    // Chip background — light cream for nature theme
    const w=feat.length*5.5+16, h=18;
    el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:'9',
      fill:'rgba(255,253,245,0.92)',stroke:tree.color,'stroke-width':'1',opacity:'0.95'},chipG);
    // Leaf dot
    el('circle',{cx:-w/2+8,cy:0,r:3,fill:'#4ade80',opacity:'0.9'},chipG);
    // Text
    const ft=el('text',{x:-w/2+16,y:4,'font-size':'9','font-weight':'700',
      fill:tree.dim},chipG);
    ft.textContent=feat;

    // Connector line
    el('line',{x1:0,y1:0,x2:tx-node.x,y2:ty-node.y,
      stroke:tree.color,'stroke-width':'0.7',opacity:'0.3',
      'stroke-dasharray':'3,3'},chipG);

    // Animate out
    chipG.style.transition=`transform .5s cubic-bezier(.34,1.56,.64,1) ${i*60}ms, opacity .3s ${i*60}ms`;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        chipG.setAttribute('transform',`translate(${tx},${ty})`);
        chipG.setAttribute('opacity','1');
      });
    });

    // Hover effect
    chipG.style.cursor='pointer';
    chipG.addEventListener('mouseenter',()=>{
      chipG.querySelector('rect')?.setAttribute('fill','rgba(255,252,235,0.98)');
    });
    chipG.addEventListener('mouseleave',()=>{
      chipG.querySelector('rect')?.setAttribute('fill','rgba(255,253,245,0.92)');
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════
// easeOutBack — slight organic overshoot at destination (dolly-settle feel)
function easeOutBack(t){
  const c1=1.50158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}
// easeInOutQuart — smooth pull-back on zoom-out
function easeInOutQuart(t){
  return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
}

function animVB(from, to, dur=520, easing=easeOutBack, cb){
  const start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    const e=easing(t);
    const cur=from.map((f,i)=>f+(to[i]-f)*e);
    svg.setAttribute('viewBox',cur.join(' '));
    currentVB=[...cur];
    if(t<1) requestAnimationFrame(frame);
    else { currentVB=[...to]; svg.setAttribute('viewBox',to.join(' ')); if(cb) cb(); }
  }
  requestAnimationFrame(frame);
}

// Scale all text labels inversely to keep them small & readable when zoomed
function scaleLabels(zoomFactor){
  svg.querySelectorAll('text').forEach(t=>{
    const base = parseFloat(t.getAttribute('data-bfs') || t.getAttribute('font-size') || 9);
    if(!t.getAttribute('data-bfs')) t.setAttribute('data-bfs', base);
    t.setAttribute('font-size', Math.max(5.5, base/zoomFactor));
  });
}
function restoreLabels(){
  svg.querySelectorAll('text').forEach(t=>{
    const base=t.getAttribute('data-bfs');
    if(base) t.setAttribute('font-size', base);
  });
}

function zoomToNode(n){
  isZoomed=true;
  svg.classList.add('zoomed');
  document.getElementById('zoom-hint').style.opacity='0.3';
  // Brief motion blur during travel
  svg.style.filter='blur(1.5px)';
  const zw=300, zh=240;
  const zoomFactor = VB_FULL[2]/zw; // ~2.73x
  animVB(currentVB,[n.x-zw/2,n.y-zh/2,zw,zh],540,easeOutBack,()=>{
    svg.style.filter='none';
    scaleLabels(zoomFactor);
  });
}

function zoomOut(){
  isZoomed=false; selectedNodeId=null;
  svg.classList.remove('zoomed');
  document.getElementById('zoom-hint').style.opacity='1';
  document.getElementById('feat-chips').innerHTML='';
  clearPathHighlight();
  restoreLabels();
  animVB(currentVB,VB_FULL,560,easeInOutQuart);
  closeDetail();
}

// ═══════════════════════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════════════════════
async function showDetail(n, tree){
  const panel=document.getElementById('detail-panel');
  const inner=document.getElementById('detail-inner');
  const isRoot = n.id==='root';
  // Tier colours adapted to light theme (readable on cream background)
  const tc={ haiku:'#c07830',sonnet:'#2d7ab8',opus:'#7040b0',
    standard:'#1d8a52',mini:'#2d8a52',reasoning:'#3a85c8','mini-r':'#2d6ea8',
    pro:'#3a85c8',flash:'#1d8a52',gemini:'#2d6ea8',early:'#8a7a6a',root:'#6b3c18' }[n.tier]||tree.color;

  const feats=TREES[currentProvider].feats?.[n.id]||[];
  const uc=USECASES[n.id]; // use-case decision data

  if(isRoot){
    inner.innerHTML=`
      <div style="min-width:200px">
        <div class="detail-name">${tree.name}</div>
        <div class="detail-api">AI Knowledge Graph · ${new Date().getFullYear()}</div>
        <span class="detail-tier" style="color:${tree.color};border-color:${tree.color}">company</span>
      </div>
      <div class="mile-section">
        <div class="mile-section-title">📡 Major Milestones & Announcements</div>
        <div class="mile-list" id="mile-list"><div class="mile-loading">Loading live data…</div></div>
      </div>
      <button class="close-btn" onclick="zoomOut()" title="Close">×</button>
    `;
    panel.classList.add('open');
    _renderMilestones(currentProvider, tree, null, null);
    return;
  }

  if(!n.api){ panel.classList.remove('open'); return; }

  // Date window ±5 months around launch for contextual milestones
  const launchYear=parseInt((n.sub||'').match(/\d{4}/)?.[0]||'0');
  const launchMonth=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    .findIndex(m=>(n.sub||'').includes(m));
  let dateFrom=null, dateTo=null;
  if(launchYear>2010){
    const d=new Date(launchYear,launchMonth>=0?launchMonth:0,1);
    d.setMonth(d.getMonth()-5); dateFrom=d.toISOString().slice(0,10);
    const d2=new Date(launchYear,launchMonth>=0?launchMonth:0,1);
    d2.setMonth(d2.getMonth()+5); dateTo=d2.toISOString().slice(0,10);
  }

  const ucSection = uc ? `
    <div class="usecase-section">
      <div class="usecase-title">Decision Guide</div>
      <div class="uc-grid">${uc.chips.map(([label,cls])=>`<span class="uc-chip ${cls}">${label}</span>`).join('')}</div>
      <div class="choose-when">✓ Choose when: ${uc.when}</div>
      <div class="skip-if" style="margin-top:5px">✗ Skip if: ${uc.skip}</div>
    </div>` : (feats.length?`<div class="detail-feats" style="margin-top:8px">${feats.map(f=>`<span class="dfeat">✦ ${f}</span>`).join('')}</div>`:'');

  inner.innerHTML=`
    <div style="min-width:170px">
      <div class="detail-name">${n.label.replace('\n',' ')}</div>
      <div class="detail-api">${n.api}</div>
      <span class="detail-tier" style="color:${tc};border-color:${tc}">${n.tier||'model'}</span>
    </div>
    <div class="detail-stats">
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.gpqa&&n.gpqa!=='—'?n.gpqa+'%':'—'}</div><div class="dstat-lbl">GPQA</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.heval&&n.heval!=='—'?n.heval+'%':'—'}</div><div class="dstat-lbl">HumanEval</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.price?'$'+n.price+'/M':'—'}</div><div class="dstat-lbl">Output price</div></div>
    </div>
    ${ucSection}
    <div class="mile-section">
      <div class="mile-section-title">🌿 Context at launch</div>
      <div class="mile-list" id="mile-list"><div class="mile-loading">Fetching…</div></div>
    </div>
    <button class="close-btn" onclick="zoomOut()" title="Close">×</button>
  `;
  panel.classList.add('open');
  _renderMilestones(currentProvider, tree, dateFrom, dateTo);
}

async function _renderMilestones(provKey, tree, dateFrom, dateTo){
  const list = document.getElementById('mile-list');
  if(!list) return;
  try {
    let rows = await getMilestones(provKey);
    // Filter by date range if provided (model context window)
    if(dateFrom && dateTo){
      rows = rows.filter(m=>m.date>=dateFrom && m.date<=dateTo);
      if(!rows.length){
        // Fall back to top 6 high-signal milestones if no date match
        rows = [..._mileCache[Object.keys(_mileCache).at(-1)]||[]]
          .sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0))
          .slice(0,6);
      }
    } else {
      // Company root: show top 12 by score
      rows = [...rows].sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0)).slice(0,12);
    }
    if(!rows.length){ list.innerHTML='<div class="mile-loading">No milestones found</div>'; return; }

    list.innerHTML = rows.map(m=>{
      const cc = claimColor(m.claim_type);
      const score = m.forward_implication_score;
      const scoreDots = score ? '◆'.repeat(score)+'◇'.repeat(5-score) : '';
      const tags = (m.tags||[]).slice(0,3).map(t=>`<span class="mile-chip">${t}</span>`).join('');
      return `<div class="mile-item" style="border-color:${cc}20;border-left-color:${cc}">
        <div class="mile-date">${(m.date||'').slice(0,7)} ${m.claim_type?`<span style="color:${cc};font-size:9px">${m.claim_type}</span>`:''} ${score?`<span style="color:#334155;letter-spacing:1px;font-size:8px">${scoreDots}</span>`:''}</div>
        <div class="mile-evt">${m.event||''}</div>
        ${m.significance?`<div class="mile-sig">${m.significance}</div>`:''}
        ${tags?`<div class="mile-chips">${tags}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){
    if(list) list.innerHTML=`<div class="mile-loading" style="color:#ef4444">Could not load — ${e.message}</div>`;
  }
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  PROVIDER SWITCH
// ═══════════════════════════════════════════════════════════
function setProvider(key, btn){
  if(currentProvider===key) return;
  currentProvider=key; isZoomed=false; selectedNodeId=null;
  currentVB=[...VB_FULL];

  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  svg.style.filter='blur(8px)';
  closeDetail();

  setTimeout(()=>{
    svg.style.filter='none';
    svg.style.transition='filter .5s';
    drawTree(key, true);
    currentVB=[...VB_FULL];
    svg.setAttribute('viewBox',VB_FULL.join(' '));
  },350);
}

// ═══════════════════════════════════════════════════════════
//  PARTICLE RENDER LOOP
// ═══════════════════════════════════════════════════════════
function renderParticles(ts){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{ p.update(); p.draw(); });
  animFrameId=requestAnimationFrame(renderParticles);
}
