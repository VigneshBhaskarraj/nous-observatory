<style>
:root {
  --bg: #04080f;
  --pc: #cf6679;
  --pc-dim: #6b2232;
  --pc-light: #f0a0b5;
  --pc-glow: rgba(207,102,121,0.35);
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color:#e2e8f0;
  display:flex; flex-direction:column;
  transition: background 0.8s;
}

/* ── HEADER ── */
.hdr {
  flex-shrink:0;
  background:rgba(4,8,15,0.92); border-bottom:1px solid rgba(255,255,255,.06);
  padding:10px 24px; display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(12px); z-index:200; position:relative;
}
.hdr-left { display:flex; align-items:center; gap:14px; }
.hdr-title { font-size:15px; font-weight:800; letter-spacing:-.3px; }
.hdr-sub   { font-size:11px; color:#475569; }
.hdr-links { display:flex; gap:12px; }
.hdr-link  { font-size:11px; color:#4285f4; text-decoration:none; opacity:.7; transition:opacity .2s; }
.hdr-link:hover { opacity:1; }

/* ── PROVIDER TABS ── */
.ptabs {
  flex-shrink:0; display:flex; justify-content:center; gap:10px;
  padding:12px 0 6px; position:relative; z-index:10;
}
.ptab {
  padding:6px 26px; border-radius:20px; border:1.5px solid;
  font-size:12px; font-weight:700; cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  background:transparent; opacity:.4; transform:scale(.95);
}
.ptab.on { opacity:1; transform:scale(1); }
.ptab.ant { border-color:#cf6679; color:#cf6679; }
.ptab.ant.on { background:rgba(207,102,121,.12); box-shadow:0 0 20px rgba(207,102,121,.2); }
.ptab.oai { border-color:#10a37f; color:#10a37f; }
.ptab.oai.on { background:rgba(16,163,127,.12); box-shadow:0 0 20px rgba(16,163,127,.2); }
.ptab.goo { border-color:#4285f4; color:#4285f4; }
.ptab.goo.on { background:rgba(66,133,244,.12); box-shadow:0 0 20px rgba(66,133,244,.2); }

/* ── MAIN STAGE ── */
.stage {
  flex:1; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
#particle-canvas {
  position:absolute; inset:0; pointer-events:none; z-index:1;
}
#tree-svg {
  position:relative; z-index:2;
  width:100%; height:100%;
  cursor:default;
  transition:filter .5s;
}
#tree-svg.zoomed { cursor:zoom-out; }

/* Zoom hint */
.zoom-hint {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#334155; z-index:5; pointer-events:none;
  transition:opacity .4s;
}

/* ── DETAIL PANEL (slides up) ── */
.detail-panel {
  flex-shrink:0;
  background:rgba(8,15,28,.97);
  border-top:1px solid rgba(255,255,255,.07);
  padding:0; max-height:0; overflow:hidden;
  transition: max-height .45s cubic-bezier(.4,0,.2,1), padding .45s;
  backdrop-filter:blur(16px);
  z-index:50; position:relative;
}
.detail-panel.open {
  max-height:320px;
  padding:14px 24px;
}
.detail-inner { overflow-y:auto; max-height:290px; }
.detail-inner { display:flex; align-items:flex-start; gap:20px; flex-wrap:wrap; }
.detail-name  { font-size:18px; font-weight:800; line-height:1; }
.detail-api   { font-size:10px; color:#475569; font-family:monospace; margin-top:4px; }
.detail-tier  { font-size:10px; font-weight:700; padding:2px 10px; border-radius:10px; border:1px solid; margin-top:6px; display:inline-block; }
.detail-stats { display:flex; gap:10px; flex-wrap:wrap; }
.dstat        { background:rgba(255,255,255,.04); border-radius:8px; padding:8px 14px; min-width:80px; }
.dstat-val    { font-size:16px; font-weight:700; }
.dstat-lbl    { font-size:9px; color:#64748b; text-transform:uppercase; letter-spacing:.4px; margin-top:1px; }
.detail-feats { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.dfeat        { font-size:10px; padding:3px 9px; border-radius:12px; background:rgba(255,255,255,.05); color:#94a3b8; border:1px solid rgba(255,255,255,.07); white-space:nowrap; }
.close-btn    { margin-left:auto; background:none; border:none; color:#475569; cursor:pointer; font-size:18px; padding:4px; line-height:1; transition:color .2s; align-self:flex-start; flex-shrink:0; }
.close-btn:hover { color:#e2e8f0; }

/* ── MILESTONE LIST ── */
.mile-section { margin-top:12px; border-top:1px solid rgba(255,255,255,.07); padding-top:10px; flex:1; min-width:260px; max-width:100%; }
.mile-section-title { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:#475569; font-weight:700; margin-bottom:7px; }

.mile-list::-webkit-scrollbar-track { background:transparent; }

.mile-item { background:rgba(255,255,255,.03); border-radius:6px; padding:6px 9px; border-left:2px solid; cursor:default; transition:background .15s; }

.mile-date  { font-size:9px; color:#475569; margin-bottom:2px; }
.mile-evt   { font-size:11px; color:#cbd5e1; line-height:1.4; }

.mile-chip  { font-size:9px; padding:1px 6px; border-radius:8px; background:rgba(255,255,255,.06); color:#64748b; }
.mile-loading { color:#334155; font-size:11px; padding:8px 0; }

/* ── TOOLTIP ── */
.tooltip {
  position:fixed; background:rgba(8,16,30,.95);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px; padding:7px 12px; font-size:11px;

  max-width:180px;

.tooltip.show { opacity:1; }
.tt-name { font-weight:700; margin-bottom:2px; }
.tt-year { color:#64748b; font-size:10px; }

/* ── ANIMATIONS ── */
@keyframes breathe {
  0%,100% { transform:scale(1); opacity:1; }
  50%      { transform:scale(1.08); opacity:.85; }

@keyframes ripple-out {

@keyframes feat-pop {

  50%      { transform:rotate(3deg); }

let _entCache = {};   // name → entity object
let _mileCache = {};  // entityId → milestones[]

async function sbGet(table, qs) {
  const r = await fetch(`${SB}/rest/v1/${table}?${qs}`, { headers:SBH });
  if (!r.ok) return [];
  return r.json();
}

async function getEntityId(provKey) {
  const name = _provNameMap[provKey];
  if (_entCache[name]) return _entCache[name].id;
  const rows = await sbGet('entities', `select=id,name&name=eq.${encodeURIComponent(name)}&limit=1`);
  if (rows[0]) _entCache[name] = rows[0];
  return rows[0]?.id || null;
}

async function getMilestones(provKey) {
  const id = await getEntityId(provKey);
  if (!id) return [];
  if (_mileCache[id]) return _mileCache[id];
  const rows = await sbGet('milestones',
    `select=date,event,significance,strategic_signal,forward_implication_score,claim_type,stack_layer,tags`+
    `&entity_id=eq.${id}&order=date.desc&limit=40`);
  _mileCache[id] = rows;
  return rows;
}

function claimColor(ct) {
  return ct==='demonstrated'?'#10b981':ct==='announced'?'#3b82f6':'#f59e0b';

function el(tag, attrs={}, parent=null){
  const e = document.createElementNS(NS, tag);

function resizeCanvas(){
  const stage = document.getElementById('stage');
  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
}

class Particle {
  constructor(type){ this.type=type; this.reset(true); }
  reset(init=false){
    if(this.type==='firefly'){
      this.x = 60 + Math.random()*(canvas.width-120);
      this.y = init ? Math.random()*canvas.height : 50+Math.random()*(canvas.height-100);
      this.baseX=this.x; this.baseY=this.y;
      this.t = Math.random()*Math.PI*2;
      this.speed = 0.004+Math.random()*0.006;
      this.radius = 20+Math.random()*60;
      this.size = 1.5+Math.random()*2;
      this.alpha = 0; this.targetAlpha = 0.2+Math.random()*0.7;
      this.alphaSpeed = 0.008+Math.random()*0.015;
    } else {
      this.x = 80+Math.random()*(canvas.width-160);
      this.y = init ? Math.random()*canvas.height*0.6 : -15;
      this.vx = (Math.random()-.5)*0.6;
      this.vy = 0.4+Math.random()*0.7;
      this.rot=Math.random()*360; this.rotSpd=(Math.random()-.5)*1.5;
      this.w=6+Math.random()*7; this.h=(4+Math.random()*5);
      this.alpha=0.5+Math.random()*0.4;
      this.swing=Math.random()*Math.PI*2; this.swingSpeed=0.02+Math.random()*0.02;
    }
  }
  update(){
    if(this.type==='firefly'){
      this.t += this.speed;
      this.x = this.baseX + Math.cos(this.t)*this.radius;
      this.y = this.baseY + Math.sin(this.t*0.7)*this.radius*0.5;
      // drift
      this.baseX += (Math.random()-.5)*0.08;
      this.baseY += (Math.random()-.5)*0.06;
      this.baseX = Math.max(40, Math.min(canvas.width-40, this.baseX));
      this.baseY = Math.max(30, Math.min(canvas.height-60, this.baseY));
      // alpha flicker
      this.alpha += (this.targetAlpha-this.alpha)*0.04;
      if(Math.random()<0.003) this.targetAlpha = 0.1+Math.random()*0.8;
    } else {
      this.swing+=this.swingSpeed;
      this.x += this.vx + Math.sin(this.swing)*0.4;
      this.y += this.vy;
      this.rot+=this.rotSpd;
      if(this.y>canvas.height+20) this.reset();
    }
  }
  draw(){
    const t = TREES[currentProvider];
    ctx.save(); ctx.globalAlpha=this.alpha;
    if(this.type==='firefly'){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*5);
      g.addColorStop(0,t.light); g.addColorStop(0.3,t.color); g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*0.4,0,Math.PI*2); ctx.fill();
    } else {
      ctx.translate(this.x,this.y); ctx.rotate(this.rot*Math.PI/180);
      // Bodhi heart-shaped leaf
      ctx.beginPath();
      ctx.moveTo(0,-this.h);
      ctx.bezierCurveTo(this.w,-this.h, this.w,this.h*0.3, 0,this.h);
      ctx.bezierCurveTo(-this.w,this.h*0.3, -this.w,-this.h, 0,-this.h);
      ctx.fillStyle='#4ade80'; ctx.fill();
      ctx.strokeStyle='rgba(74,222,128,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
    }
    ctx.restore();
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<22;i++) particles.push(new Particle('firefly'));
  for(let i=0;i<12;i++) particles.push(new Particle('leaf'));
}

// ═══════════════════════════════════════════════════════════
//  DRAW TREE
// ═══════════════════════════════════════════════════════════
function getDepth(nodeMap, id){
  let d=0,cur=id;
  while(nodeMap[cur]?.parent){cur=nodeMap[cur].parent;d++;}
  return d;
}

function drawTree(provKey, animate=true){
  svg.innerHTML='';
  const tree = TREES[provKey];
  const nodes = tree.nodes;
  const nMap={}; nodes.forEach(n=>nMap[n.id]=n);

  // ── CSS vars ──────────────────────────────────────────────
  document.documentElement.style.setProperty('--pc', tree.color);
  document.documentElement.style.setProperty('--pc-dim', tree.dim);
  document.documentElement.style.setProperty('--pc-light', tree.light);
  document.documentElement.style.setProperty('--pc-glow', tree.glow);

  // ── Defs ─────────────────────────────────────────────────
  const defs = el('defs',{},svg);

  // Node glow
  const fg=el('filter',{id:'fg',x:'-80%',y:'-80%',width:'260%',height:'260%'},defs);
  el('feGaussianBlur',{stdDeviation:'5',result:'b',in:'SourceGraphic'},fg);
  const fm=el('feMerge',{},fg);
  el('feMergeNode',{in:'b'},fm); el('feMergeNode',{in:'SourceGraphic'},fm);

  // Strong glow for latest
  const fgS=el('filter',{id:'fgS',x:'-150%',y:'-150%',width:'400%',height:'400%'},defs);
  el('feGaussianBlur',{stdDeviation:'8',result:'b2',in:'SourceGraphic'},fgS);
  const fm2=el('feMerge',{},fgS);
  el('feMergeNode',{in:'b2'},fm2); el('feMergeNode',{in:'SourceGraphic'},fm2);

  // Feather for leaves
  const fLeaf=el('filter',{id:'fLeaf',x:'-60%',y:'-60%',width:'220%',height:'220%'},defs);
  el('feGaussianBlur',{stdDeviation:'1.5',result:'bl',in:'SourceGraphic'},fLeaf);
  const fm3=el('feMerge',{},fLeaf);
  el('feMergeNode',{in:'bl'},fm3); el('feMergeNode',{in:'SourceGraphic'},fm3);

  // Ground gradient
  const rg=el('radialGradient',{id:'rg',cx:'50%',cy:'100%',r:'40%'},defs);
  el('stop',{offset:'0%','stop-color':tree.color,'stop-opacity':'0.15'},rg);
  el('stop',{offset:'100%','stop-color':tree.color,'stop-opacity':'0'},rg);

  // Branch gradient (warm root → provider tip)
  const bg=el('linearGradient',{id:'bgrad',x1:'0',y1:'1',x2:'0',y2:'0'},defs);
  el('stop',{offset:'0%','stop-color':'#5a3810'},bg);
  el('stop',{offset:'40%','stop-color':'#7a4e22'},bg);
  el('stop',{offset:'100%','stop-color':tree.color},bg);

  // ── Background elements ───────────────────────────────────
  el('rect',{x:0,y:0,width:820,height:540,fill:'#04080f'},svg);

  // Atmospheric mist layers
  for(let i=0;i<3;i++){
    el('ellipse',{cx:200+i*210,cy:520,rx:140+i*20,ry:18,
      fill:tree.color,opacity:(0.04+i*0.02).toString()},svg);
  }
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#rg)'},svg);

  // Stars
  const starData=[
    [45,32],[112,18],[198,45],[287,12],[356,38],[443,8],[521,29],[614,16],
    [698,41],[742,11],[780,28],[66,68],[157,82],[244,55],[388,72],[478,49],
    [562,77],[645,52],[720,68],[798,44],[30,15],[169,5],[304,25],[467,18],[596,7]
  ];
  starData.forEach(([sx,sy],i)=>{
    const sr=i%4===0?1.2:0.6;
    el('circle',{cx:sx,cy:sy,r:sr,fill:'#fff',opacity:(0.12+i%5*0.05).toString()},svg);
  });

  // ── Groups ────────────────────────────────────────────────
  const gBranches  = el('g',{id:'branches'},svg);
  const gPathTrace = el('g',{id:'path-trace'},svg);
  const gRipples   = el('g',{id:'ripples'},svg);
  const gLeaves    = el('g',{id:'leaf-clusters'},svg);
  const gNodes     = el('g',{id:'nodes'},svg);
  const gFeatChips = el('g',{id:'feat-chips'},svg);

  // ── Ground ───────────────────────────────────────────────
  el('ellipse',{cx:410,cy:524,rx:56,ry:9,fill:tree.color,opacity:'0.12'},gBranches);
  // Root hairs
  for(let i=0;i<7;i++){
    const rx=410+(i-3)*18+Math.sin(i*1.7)*8;
    const ry=524+Math.abs(Math.sin(i*0.9))*12;
    el('line',{x1:410,y1:524,x2:rx,y2:ry,
      stroke:tree.dim,'stroke-width':'1.5',opacity:'0.5','stroke-linecap':'round'},gBranches);
  }

  // ── Branches ─────────────────────────────────────────────
  const branchEls=[];
  const branchNodes=nodes.filter(n=>n.parent).sort((a,b)=>getDepth(nMap,a.id)-getDepth(nMap,b.id));

  branchNodes.forEach(n=>{
    const p=nMap[n.parent];
    const depth=getDepth(nMap,n.id);
    const swMap=[12,8,5.5,4,3,2.5];
    const sw=swMap[Math.min(depth,swMap.length-1)];

    const dx=n.x-p.x, dy=n.y-p.y;
    const cp1x=p.x+dx*0.15, cp1y=p.y+dy*0.42;
    const cp2x=p.x+dx*0.82, cp2y=p.y+dy*0.58;
    const d=`M${p.x} ${p.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${n.x} ${n.y}`;

    // Shadow
    el('path',{d,fill:'none',stroke:'#000','stroke-width':sw+3,
      'stroke-linecap':'round',opacity:'0.6'},gBranches);
    // Main
    const bEl=el('path',{d,fill:'none',stroke:'url(#bgrad)',
      'stroke-width':sw,'stroke-linecap':'round',
      opacity: n.isLatest?'0.95':'0.78',
      'data-branch':n.id},gBranches);

    // Animate growth
    if(animate){
      try {
        const len=bEl.getTotalLength();
        bEl.style.strokeDasharray=len;
        bEl.style.strokeDashoffset=len;
        const delay=depth*180+Math.random()*80;
        bEl.style.transition=`stroke-dashoffset ${0.6+depth*0.12}s ease-out ${delay}ms`;
        requestAnimationFrame(()=>{ bEl.style.strokeDashoffset='0'; });
      } catch(e){}
    }
    branchEls.push({el:bEl,nodeId:n.id});
  });

  // ── Leaf clusters on terminal nodes ──────────────────────
  const childIds=new Set(nodes.filter(n=>n.parent).map(n=>n.parent));
  const terminals=nodes.filter(n=>!childIds.has(n.id)&&n.id!=='root');

  terminals.forEach(n=>{
    const leafG=el('g',{'data-leaf-for':n.id},gLeaves);
    const cnt=8+Math.floor(Math.random()*5);
    for(let i=0;i<cnt;i++){
      const ang=((i/cnt)*Math.PI*1.6-Math.PI*1.1);
      const dist=18+i%3*9;
      const lx=n.x+Math.cos(ang)*dist;
      const ly=n.y+Math.sin(ang)*dist-6;
      const rot=ang*180/Math.PI+90;
      const lw=5+i%3*2, lh=lw*0.55;
      // Bodhi-style heart leaf
      const lp=el('path',{
        d:`M0,${-lh} C${lw},${-lh} ${lw},${lh*0.4} 0,${lh} C${-lw},${lh*0.4} ${-lw},${-lh} 0,${-lh}`,
        fill:`hsl(${120+i*8},${60+i*3}%,${50+i*2}%)`,
        opacity:(0.45+i%3*0.15).toString(),
        transform:`translate(${lx},${ly}) rotate(${rot})`,
        filter:'url(#fLeaf)',
        style:`animation:leaf-sway ${2.5+i*0.3}s ease-in-out ${i*0.2}s infinite`
      },leafG);
    }
  });

  // ── Nodes ────────────────────────────────────────────────
  nodes.forEach(n=>{
    const isRoot=n.id==='root';
    const isLatest=n.isLatest;
    const isTerm=!childIds.has(n.id)&&!isRoot;
    const depth=getDepth(nMap,n.id);
    const nodeG=el('g',{
      transform:`translate(${n.x},${n.y})`,
      style:'cursor:pointer',
      'data-nid':n.id
    },gNodes);

    // Outer pulse ring (latest nodes)
    if(isLatest){
      const ring=el('circle',{cx:0,cy:0,r:n.r+8,fill:'none',
        stroke:tree.light,'stroke-width':'1',
        opacity:'0.35',
        style:`animation:leaf-sway ${2+n.r*0.1}s ease-in-out infinite`},nodeG);
      const ring2=el('circle',{cx:0,cy:0,r:n.r+16,fill:'none',
        stroke:tree.light,'stroke-width':'0.5',opacity:'0.15'},nodeG);
    }

    // Node body
    const fillC = isRoot   ? tree.dim :
                  isLatest ? tree.color :
                  depth<=1 ? '#4a2810' :
                  depth<=2 ? '#6b3d18' : tree.dim;
    const strokeC = isLatest ? tree.light : isRoot ? tree.color : tree.color;
    el('circle',{cx:0,cy:0,r:n.r,fill:fillC,stroke:strokeC,
      'stroke-width': isLatest?'2.5':'1.5',
      filter: isLatest?'url(#fgS)':'url(#fg)',
      style: isTerm?`animation:breathe ${2.5+depth*0.2}s ease-in-out ${n.x%1.5}s infinite`:''
    },nodeG);

    // Inner bright core
    if(!isRoot){
      el('circle',{cx:0,cy:0,r:Math.max(2,n.r-5),
        fill: isLatest ? tree.light : tree.color,
        opacity: isLatest ? '0.4':'0.2'},nodeG);
    }

    // Label above node
    const lines=n.label.split('\n');
    lines.forEach((line,idx)=>{
      const offset = lines.length>1 ? (idx===0?-(n.r+13):-(n.r+4)) : -(n.r+10);
      const t=el('text',{x:0,y:offset,'text-anchor':'middle',
        'font-size': isRoot?'11':'10',
        'font-weight': isLatest||isRoot?'800':'600',
        fill: isLatest?tree.light:isRoot?'#94a3b8':'#cbd5e1',
        'paint-order':'stroke',stroke:'#04080f','stroke-width':'3','stroke-linejoin':'round'
      },nodeG);
      t.textContent=line;
    });

    // Year below
    if(!isRoot){
      const yt=el('text',{x:0,y:n.r+12,'text-anchor':'middle',
        'font-size':'8.5', fill:'#3d5068'
      },nodeG);
      yt.textContent=n.sub.split('·')[0].trim();
    }

    // ── Events ────────────────────────────────────────────
    nodeG.addEventListener('mouseenter', e=>{
      document.getElementById('tt-name').textContent=n.label.replace('\n',' ');
      document.getElementById('tt-year').textContent=(n.api||'')+' · '+n.sub;
      const tt=document.getElementById('tooltip');
      tt.style.setProperty('border-color',tree.color);
      tt.classList.add('show');
      // Highlight path
      highlightPath(n.id, tree, nMap);
    });
    nodeG.addEventListener('mousemove', e=>{
      const tt=document.getElementById('tooltip');
      tt.style.left=(e.clientX+15)+'px';
      tt.style.top=(e.clientY-8)+'px';
    });
    nodeG.addEventListener('mouseleave', ()=>{
      document.getElementById('tooltip').classList.remove('show');
      clearPathHighlight();
    });
    nodeG.addEventListener('click', e=>{
      e.stopPropagation();
      if(selectedNodeId===n.id && isZoomed){ zoomOut(); return; }
      selectedNodeId=n.id;
      ripple(n.x, n.y, tree.color, gRipples);
      if(!n.id||n.id!=='root') zoomToNode(n);
      showFeatChips(n, tree, nMap, gFeatChips);
      showDetail(n, tree);  // async — renders panel immediately, then fills milestones
    });
  });

  // Click background to zoom out
  svg.addEventListener('click', ()=>{ if(isZoomed) zoomOut(); });

  // Title
  const titleEl=el('text',{x:806,y:22,'text-anchor':'end','font-size':'12',
    'font-weight':'700',fill:tree.color,opacity:'0.5'},svg);
  titleEl.textContent=tree.name+' · Evolution Tree';
}

// ═══════════════════════════════════════════════════════════
//  PATH HIGHLIGHT
// ═══════════════════════════════════════════════════════════
function getPathToRoot(nodeId, nMap){
  const path=[]; let cur=nodeId;
  while(nMap[cur]){path.push(nMap[cur]); cur=nMap[cur].parent; if(!cur) break;}
  return path;
}

function highlightPath(nodeId, tree, nMap){
  clearPathHighlight();
  const pathNodes=getPathToRoot(nodeId, nMap);
  const g=document.getElementById('path-trace');
  if(!g) return;

  for(let i=1;i<pathNodes.length;i++){
    const child=pathNodes[i-1], par=pathNodes[i];
    const dx=child.x-par.x, dy=child.y-par.y;
    const cp1x=par.x+dx*.15, cp1y=par.y+dy*.42;
    const cp2x=par.x+dx*.82, cp2y=par.y+dy*.58;
    const d=`M${par.x} ${par.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${child.x} ${child.y}`;

    const glow=el('path',{d,fill:'none',stroke:tree.light,'stroke-width':'6',
      'stroke-linecap':'round',opacity:'0.35',class:'path-trace-el'},g);
    const bright=el('path',{d,fill:'none',stroke:'#fff','stroke-width':'2',
      'stroke-linecap':'round',opacity:'0.6',class:'path-trace-el'},g);

    try {
      const len=glow.getTotalLength();
      [glow,bright].forEach(pe=>{
        pe.style.strokeDasharray=len; pe.style.strokeDashoffset=len;
        pe.style.transition=`stroke-dashoffset 0.35s ease-out ${(i-1)*80}ms`;
        requestAnimationFrame(()=>{ pe.style.strokeDashoffset='0'; });
      });
    } catch(e){}
  }
}

function clearPathHighlight(){
  const g=document.getElementById('path-trace');
  if(g) g.innerHTML='';
}

// ═══════════════════════════════════════════════════════════
//  RIPPLE
// ═══════════════════════════════════════════════════════════
function ripple(x, y, color, group){
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const c=el('circle',{cx:x,cy:y,r:'6',fill:'none',stroke:color,
        'stroke-width':'2',opacity:'0.9'},group);
      c.animate([
        {r:'6px',opacity:'0.8','stroke-width':'2px'},
        {r:'45px',opacity:'0','stroke-width':'0.5px'}
      ],{duration:700+i*150,easing:'ease-out',fill:'forwards'})
      .onfinish=()=>c.remove();
    },i*120);
  }
}

// ═══════════════════════════════════════════════════════════
//  FEATURE CHIPS RADIATE FROM NODE
// ═══════════════════════════════════════════════════════════
function showFeatChips(node, tree, nMap, group){
  group.innerHTML='';
  const feats=TREES[currentProvider].feats?.[node.id]||[];
  if(!feats.length) return;

  const count=feats.length;
  feats.forEach((feat,i)=>{
    const angle=(i/(count))*(Math.PI*1.2)-Math.PI*1.1;
    const dist=75+Math.floor(i/4)*30;
    const tx=node.x+Math.cos(angle)*dist;
    const ty=node.y+Math.sin(angle)*dist;

    const chipG=el('g',{transform:`translate(${node.x},${node.y})`,opacity:'0'},group);

    // Chip background
    const w=feat.length*5.5+16, h=18;
    el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:'9',
      fill:'rgba(4,8,15,0.88)',stroke:tree.color,'stroke-width':'1',opacity:'0.9'},chipG);
    // Leaf dot
    el('circle',{cx:-w/2+8,cy:0,r:3,fill:'#4ade80',opacity:'0.8'},chipG);
    // Text
    const ft=el('text',{x:-w/2+16,y:4,'font-size':'9.5','font-weight':'600',
      fill:tree.light},chipG);
    ft.textContent=feat;

    // Connector line
    el('line',{x1:0,y1:0,x2:tx-node.x,y2:ty-node.y,
      stroke:tree.color,'stroke-width':'0.7',opacity:'0.3',
      'stroke-dasharray':'3,3'},chipG);

    // Animate out
    chipG.style.transition=`transform .5s cubic-bezier(.34,1.56,.64,1) ${i*60}ms, opacity .3s ${i*60}ms`;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        chipG.setAttribute('transform',`translate(${tx},${ty})`);
        chipG.setAttribute('opacity','1');
      });
    });

    // Hover effect
    chipG.style.cursor='pointer';
    chipG.addEventListener('mouseenter',()=>{
      chipG.querySelector('rect')?.setAttribute('fill',tree.dim);
    });
    chipG.addEventListener('mouseleave',()=>{
      chipG.querySelector('rect')?.setAttribute('fill','rgba(4,8,15,0.88)');
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════
function animVB(from, to, dur=550, cb){
  const start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    const e=t<.5?2*t*t:-1+(4-2*t)*t;
    const cur=from.map((f,i)=>f+(to[i]-f)*e);
    svg.setAttribute('viewBox',cur.join(' '));
    currentVB=[...cur];
    if(t<1) requestAnimationFrame(frame);
    else if(cb) cb();
  }
  requestAnimationFrame(frame);
}

function zoomToNode(n){
  isZoomed=true;
  svg.classList.add('zoomed');
  document.getElementById('zoom-hint').style.opacity='0.4';
  const zw=320, zh=260;
  animVB(currentVB,[n.x-zw/2,n.y-zh/2,zw,zh]);
}

function zoomOut(){
  isZoomed=false; selectedNodeId=null;
  svg.classList.remove('zoomed');
  document.getElementById('zoom-hint').style.opacity='1';
  document.getElementById('feat-chips').innerHTML='';
  clearPathHighlight();
  animVB(currentVB,VB_FULL,600);
  closeDetail();
}

  inner.innerHTML=`

    <div class="detail-stats">
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.gpqa||'—'}<span style="font-size:10px;color:#475569">${n.gpqa&&n.gpqa!=='—'?'%':''}</span></div><div class="dstat-lbl">GPQA Diamond</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.heval||'—'}<span style="font-size:10px;color:#475569">${n.heval&&n.heval!=='—'?'%':''}</span></div><div class="dstat-lbl">HumanEval</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.price?'$'+n.price:'—'}</div><div class="dstat-lbl">Price /M out</div></div>
    </div>
    ${feats.length?`<div class="detail-feats">${feats.map(f=>`<span class="dfeat">✦ ${f}</span>`).join('')}</div>`:''}
    <div class="mile-section" style="border-color:${tree.color}">
      <div class="mile-section-title">🌿 What was happening around this launch</div>
      <div class="mile-list" id="mile-list"><div class="mile-loading">Fetching context…</div></div>
    </div>
    <button class="close-btn" onclick="zoomOut()" title="Zoom out">×</button>
  `;
  panel.classList.add('open');
  _renderMilestones(currentProvider, tree, dateFrom, dateTo);
}

async function _renderMilestones(provKey, tree, dateFrom, dateTo){
  const list = document.getElementById('mile-list');
  if(!list) return;
  try {
    let rows = await getMilestones(provKey);
    // Filter by date range if provided (model context window)
    if(dateFrom && dateTo){
      rows = rows.filter(m=>m.date>=dateFrom && m.date<=dateTo);
      if(!rows.length){
        // Fall back to top 6 high-signal milestones if no date match
        rows = [..._mileCache[Object.keys(_mileCache).at(-1)]||[]]
          .sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0))
          .slice(0,6);
      }
    } else {
      // Company root: show top 12 by score
      rows = [...rows].sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0)).slice(0,12);
    }
    if(!rows.length){ list.innerHTML='<div class="mile-loading">No milestones found</div>'; return; }

    list.innerHTML = rows.map(m=>{
      const cc = claimColor(m.claim_type);
      const score = m.forward_implication_score;
      const scoreDots = score ? '◆'.repeat(score)+'◇'.repeat(5-score) : '';
      const tags = (m.tags||[]).slice(0,3).map(t=>`<span class="mile-chip">${t}</span>`).join('');
      return `<div class="mile-item" style="border-color:${cc}20;border-left-color:${cc}">
        <div class="mile-date">${(m.date||'').slice(0,7)} ${m.claim_type?`<span style="color:${cc};font-size:9px">${m.claim_type}</span>`:''} ${score?`<span style="color:#334155;letter-spacing:1px;font-size:8px">${scoreDots}</span>`:''}</div>
        <div class="mile-evt">${m.event||''}</div>
        ${m.significance?`<div class="mile-sig">${m.significance}</div>`:''}
        ${tags?`<div class="mile-chips">${tags}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){
    if(list) list.innerHTML=`<div class="mile-loading" style="color:#ef4444">Could not load — ${e.message}</div>`;
  }
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  PROVIDER SWITCH
// ═══════════════════════════════════════════════════════════
function setProvider(key, btn){
  if(currentProvider===key) return;
  currentProvider=key; isZoomed=false; selectedNodeId=null;
  currentVB=[...VB_FULL];

  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  svg.style.filter='blur(8px)';
  closeDetail();

  setTimeout(()=>{
    svg.style.filter='none';
    svg.style.transition='filter .5s';
    drawTree(key, true);
    currentVB=[...VB_FULL];
    svg.setAttribute('viewBox',VB_FULL.join(' '));
  },350);
}

// ═══════════════════════════════════════════════════════════
//  PARTICLE RENDER LOOP
// ═══════════════════════════════════════════════════════════
let lastLeafSpawn=0;
function renderParticles(ts){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(ts-lastLeafSpawn>4200 && particles.filter(p=>p.type==='leaf').length<14){
    particles.push(new Particle('leaf'));
    lastLeafSpawn=ts;
  }
  particles.forEach(p=>{ p.update(); p.draw(); });
  animFrameId=requestAnimationFrame(renderParticles);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  resizeCanvas();
});

resizeCanvas();
initParticles();
drawTree('anthropic', true);
requestAnimationFrame(renderParticles);
</script>
