<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Evolution Tree — Nous Observatory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #060b14;
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.hdr {
  background: rgba(6,11,20,.95);
  border-bottom: 1px solid #1e2d3d;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
}
.hdr-title { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
.hdr-sub   { font-size: 11px; color: #475569; margin-top: 1px; }
.hdr-link  { font-size: 12px; color: #4285f4; text-decoration: none; }
.hdr-link:hover { text-decoration: underline; }

/* ── PROVIDER TABS ── */
.ptabs {
  display: flex; justify-content: center; gap: 12px;
  padding: 20px 0 8px;
}
.ptab {
  padding: 8px 28px; border-radius: 24px;
  border: 2px solid; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .2s; background: transparent;
}
.ptab:hover { opacity: 1; }
.ptab { opacity: .5; }
.ptab.on { opacity: 1; }
.ptab.ant { border-color: #cf6679; color: #cf6679; }
.ptab.ant.on { background: rgba(207,102,121,.12); }
.ptab.oai { border-color: #10a37f; color: #10a37f; }
.ptab.oai.on { background: rgba(16,163,127,.12); }
.ptab.goo { border-color: #4285f4; color: #4285f4; }
.ptab.goo.on { background: rgba(66,133,244,.12); }

/* ── CANVAS WRAP ── */
.canvas-wrap {
  display: flex; justify-content: center;
  padding: 0 20px;
  overflow-x: auto;
}
#tree-svg {
  display: block;
  cursor: default;
}

/* ── LEGEND ── */
.legend {
  display: flex; justify-content: center; gap: 20px;
  padding: 8px 0 4px;
  flex-wrap: wrap;
}
.leg-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #64748b;
}
.leg-dot { width: 10px; height: 10px; border-radius: 50%; }

/* ── DETAIL PANEL ── */
.detail-wrap {
  max-width: 860px; margin: 16px auto 40px;
  padding: 0 24px;
}
.detail-panel {
  background: #0d1b2e;
  border: 1px solid #1e2d45;
  border-radius: 14px;
  padding: 20px 24px;
  min-height: 90px;
}
.detail-empty {
  color: #475569; font-size: 13px; font-style: italic;
  display: flex; align-items: center; gap: 8px;
  height: 50px;
}
.detail-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 14px;
}
.detail-name { font-size: 20px; font-weight: 800; }
.detail-api  { font-size: 11px; color: #64748b; font-family: monospace; margin-top: 3px; }
.detail-tier-badge {
  font-size: 11px; font-weight: 700; padding: 3px 12px;
  border-radius: 12px; border: 1.5px solid;
}
.detail-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 14px;
}
@media(max-width:600px) { .detail-stats { grid-template-columns: repeat(2,1fr); } }
.dstat {
  background: #0a111e;
  border-radius: 8px; padding: 10px 12px;
}
.dstat-val { font-size: 18px; font-weight: 700; }
.dstat-lbl { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }
.detail-features {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.dfeat {
  font-size: 11px; padding: 3px 10px; border-radius: 5px;
  background: rgba(255,255,255,.05); color: #94a3b8; border: 1px solid rgba(255,255,255,.08);
}

/* ── YEAR LABELS ── */
.year-bar {
  display: flex; justify-content: center;
  padding: 0 20px 6px;
}
.year-bar-inner {
  width: 820px; max-width: 100%;
  display: flex; justify-content: space-between;
  padding: 0 20px;
}
.yr { font-size: 10px; color: #2d3f55; font-weight: 600; }

/* ── TOOLTIP ── */
.tooltip {
  position: fixed;
  background: #0d1b2e;
  border: 1px solid #1e2d45;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: opacity .15s;
  max-width: 200px;
}
.tooltip.show { opacity: 1; }
.tt-name { font-weight: 700; margin-bottom: 2px; }
.tt-year { color: #64748b; font-size: 11px; }
</style>

      // 2.5

// ─────────────────────────────────────────────────────────────
//  DRAWING ENGINE
// ─────────────────────────────────────────────────────────────
const svg = document.getElementById('tree-svg');
let currentProvider = 'anthropic';

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

function drawTree(providerKey) {
  svg.innerHTML = '';
  const tree = TREES[providerKey];
  const nodes = tree.nodes;
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  // ── Defs: filters + gradients ──────────────────────────
  const defs = svgEl('defs', {});

  // Glow filter
  const fGlow = svgEl('filter', { id:'glow', x:'-50%', y:'-50%', width:'200%', height:'200%' });
  const blur1 = svgEl('feGaussianBlur', { stdDeviation:'4', result:'blur', in:'SourceGraphic' });
  const merge = svgEl('feMerge', {});
  const mn1   = svgEl('feMergeNode', { in:'blur' });
  const mn2   = svgEl('feMergeNode', { in:'SourceGraphic' });
  merge.appendChild(mn1); merge.appendChild(mn2);
  fGlow.appendChild(blur1); fGlow.appendChild(merge);
  defs.appendChild(fGlow);

  // Softer glow for leaves
  const fLeaf = svgEl('filter', { id:'leaf-glow', x:'-100%', y:'-100%', width:'300%', height:'300%' });
  const blur2 = svgEl('feGaussianBlur', { stdDeviation:'2.5', result:'b2', in:'SourceGraphic' });
  const mg2   = svgEl('feMerge', {});
  const mn3   = svgEl('feMergeNode', { in:'b2' });
  const mn4   = svgEl('feMergeNode', { in:'SourceGraphic' });
  mg2.appendChild(mn3); mg2.appendChild(mn4);
  fLeaf.appendChild(blur2); fLeaf.appendChild(mg2);
  defs.appendChild(fLeaf);

  // Radial ground glow
  const rGrad = svgEl('radialGradient', { id:'groundGlow', cx:'50%', cy:'100%', r:'40%' });
  const rs1   = svgEl('stop', { offset:'0%',   'stop-color': tree.color, 'stop-opacity':'0.18' });
  const rs2   = svgEl('stop', { offset:'100%', 'stop-color': tree.color, 'stop-opacity':'0' });
  rGrad.appendChild(rs1); rGrad.appendChild(rs2);
  defs.appendChild(rGrad);

  svg.appendChild(defs);

  // ── Background ──────────────────────────────────────────
  const bg = svgEl('rect', { x:0, y:0, width:W, height:H, fill:'#060b14' });
  svg.appendChild(bg);

  // Stars (small random dots)
  const starSeeds = [23,67,123,189,245,312,378,445,512,578,634,701,767,834,900];
  starSeeds.forEach((s,i) => {
    const sx = (s * 53) % W;
    const sy = (s * 37) % (H * 0.7);
    const sr = i%3===0 ? 1.2 : 0.7;
    const star = svgEl('circle', { cx:sx, cy:sy, r:sr, fill:'#ffffff', opacity: 0.15 + (i%4)*0.08 });
    svg.appendChild(star);
  });

  // Ground glow
  const groundGlow = svgEl('rect', { x:0, y:0, width:W, height:H, fill:'url(#groundGlow)' });
  svg.appendChild(groundGlow);

  // Ground line
  const ground = svgEl('ellipse', { cx:410, cy:598, rx:60, ry:8, fill: tree.color, opacity:'0.15' });
  svg.appendChild(ground);

  // ── Compute depth for stroke-width ──────────────────────
  function getDepth(id) {
    let d=0, cur=id;
    while(nodeMap[cur]?.parent){ cur=nodeMap[cur].parent; d++; }
    return d;
  }
  function strokeW(id) {
    const d = getDepth(id);
    const widths = [12, 8, 5.5, 4, 3, 2.5];
    return widths[Math.min(d, widths.length-1)];
  }

  // ── Draw branches ────────────────────────────────────────
  // Sort so root branches draw first (lower z-order)
  const branchNodes = nodes.filter(n => n.parent);
  branchNodes.sort((a,b) => getDepth(a.id) - getDepth(b.id));

  branchNodes.forEach(n => {
    const p = nodeMap[n.parent];
    const isLatest = n.isLatest;

    // Bezier control points: natural organic curve
    const dx = n.x - p.x;
    const dy = n.y - p.y;
    const cp1x = p.x + dx * 0.15;
    const cp1y = p.y + dy * 0.4;
    const cp2x = p.x + dx * 0.85;
    const cp2y = p.y + dy * 0.6;

    const d = `M ${p.x} ${p.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${n.x} ${n.y}`;
    const sw = strokeW(n.id);

    // Shadow branch (darker, slightly offset)
    const shadow = svgEl('path', {
      d, fill:'none',
      stroke: tree.dimColor,
      'stroke-width': sw + 2,
      'stroke-linecap': 'round',
      opacity: '0.5'
    });
    svg.appendChild(shadow);

    // Main branch
    const branchColor = isLatest
      ? tree.lightColor
      : getDepth(n.id) <= 1 ? '#5a3c1e' : getDepth(n.id) <= 2 ? '#7a5228' : tree.color;

    const branch = svgEl('path', {
      d, fill: 'none',
      stroke: branchColor,
      'stroke-width': sw,
      'stroke-linecap': 'round',
      opacity: isLatest ? '0.9' : '0.75'
    });
    svg.appendChild(branch);
  });

  // ── Draw leaf clusters on terminal nodes ─────────────────
  const childIds = new Set(nodes.filter(n=>n.parent).map(n=>n.parent));
  const terminals = nodes.filter(n => !childIds.has(n.id) && n.id !== 'root');
  const leafColors = ['#4ade80','#86efac','#6ee7b7','#34d399','#a7f3d0'];

  terminals.forEach(n => {
    const angles = [-60,-30,0,30,60,-45,45,-15,15];
    const leafCount = 7 + (n.id.length % 4);
    for(let i=0;i<leafCount;i++){
      const angle = (angles[i % angles.length] + (i*7)) * Math.PI / 180;
      const dist  = 14 + (i % 3) * 6;
      const lx    = n.x + Math.cos(angle) * dist;
      const ly    = n.y + Math.sin(angle) * dist - 4;
      const lr    = 4 + (i % 3);
      const lrx   = lr * 1.4;
      const lry   = lr * 0.8;
      const rot   = angle * 180 / Math.PI;
      const lc    = leafColors[i % leafColors.length];
      const leaf  = svgEl('ellipse', {
        cx: lx, cy: ly, rx: lrx, ry: lry,
        fill: lc,
        opacity: 0.55 + (i%3)*0.1,
        transform: `rotate(${rot}, ${lx}, ${ly})`,
        filter: 'url(#leaf-glow)'
      });
      svg.appendChild(leaf);
    }
  });

  // ── Draw nodes ───────────────────────────────────────────
  nodes.forEach(n => {
    const isRoot    = n.id === 'root';
    const isLatest  = n.isLatest;
    const isTerminal = !childIds.has(n.id) && !isRoot;

    const g = svgEl('g', {
      transform: `translate(${n.x},${n.y})`,
      style: 'cursor: pointer',
      class: 'tree-node',
      'data-id': n.id
    });

    if(isRoot){
      // Root: ground anchor
      const base = svgEl('ellipse', { cx:0, cy:0, rx:18, ry:10, fill: tree.color, opacity:'0.2' });
      g.appendChild(base);
    }

    // Outer glow ring (for latest nodes)
    if(isLatest){
      const ring = svgEl('circle', { cx:0, cy:0, r: n.r+6, fill:'none', stroke: tree.lightColor, 'stroke-width':'1.5', opacity:'0.4' });
      g.appendChild(ring);
    }

    // Node circle
    const fill = isRoot ? tree.dimColor :
                 isLatest ? tree.lightColor :
                 isTerminal ? tree.color :
                 getDepth(n.id) <= 1 ? '#6b4c2a' :
                 getDepth(n.id) <= 2 ? '#8b6330' : tree.dimColor;

    const circle = svgEl('circle', {
      cx:0, cy:0, r: n.r,
      fill,
      stroke: isLatest ? '#fff' : tree.color,
      'stroke-width': isLatest ? '2' : '1.5',
      filter: 'url(#glow)',
      opacity: isRoot ? '0.9' : '1'
    });
    g.appendChild(circle);

    // Label
    const lines = n.label.split('\n');
    lines.forEach((line, idx) => {
      const textY = lines.length === 2
        ? (idx === 0 ? -(n.r + 15) : -(n.r + 4))
        : -(n.r + 10);
      const txt = svgEl('text', {
        x:0, y: textY,
        'text-anchor':'middle',
        'font-size': isRoot ? '12' : '11',
        'font-weight': isLatest || isRoot ? '700' : '600',
        fill: isLatest ? tree.lightColor : isRoot ? '#94a3b8' : '#cbd5e1',
        'paint-order': 'stroke',
        stroke: '#060b14',
        'stroke-width': '3',
        'stroke-linejoin': 'round'
      });
      txt.textContent = line;
      g.appendChild(txt);
    });

    // Year badge below node
    if(!isRoot){
      const yearBg = svgEl('rect', {
        x:-22, y: n.r+3, width:44, height:14,
        rx:4, fill:'rgba(6,11,20,0.7)'
      });
      const yearTxt = svgEl('text', {
        x:0, y: n.r+13,
        'text-anchor':'middle',
        'font-size':'9',
        fill: '#475569'
      });
      yearTxt.textContent = n.sub.split('·')[0].trim().replace('May 2025','2025').replace('Nov 2024','Nov\'24').replace('Oct 2024','Oct\'24').replace('Jun 2024','Jun\'24').replace('Mar 2024','Mar\'24').replace('Jul 2023','2023').replace('Mar 2023','2023').replace('Dec 2024','Dec\'24').replace('Apr 2025','Apr\'25').replace('Feb 2025','Feb\'25').replace('Feb 2024','Feb\'24').replace('May 2024','May\'24').replace('Dec 2023','Dec\'23').replace('Mar 2023','Mar\'23').replace('Jun 2020','2020').replace('Nov 2022','2022').replace('Mar 2023','2023');
      g.appendChild(yearBg);
      g.appendChild(yearTxt);
    }

    // Click handler
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(n, tree);
      document.querySelectorAll('.tree-node circle').forEach(c => c.style.filter='url(#glow)');
      g.querySelector('circle').style.filter = 'url(#glow) drop-shadow(0 0 8px white)';
    });

    // Tooltip
    g.addEventListener('mouseenter', (e) => {
      const tt = document.getElementById('tooltip');
      document.getElementById('tt-name').textContent = n.label.replace('\n',' ');
      document.getElementById('tt-year').textContent = n.sub + (n.apiVersion ? ' · ' + n.apiVersion : '');
      tt.classList.add('show');
    });
    g.addEventListener('mousemove', (e) => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top  = (e.clientY - 10) + 'px';
    });
    g.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').classList.remove('show');
    });

    svg.appendChild(g);
  });

  // ── Title ─────────────────────────────────────────────────
  const titleEl = svgEl('text', {
    x: W-16, y: 24,
    'text-anchor':'end',
    'font-size':'13',
    'font-weight':'700',
    fill: tree.color,
    opacity: '0.7'
  });
  titleEl.textContent = tree.name + ' · Model Lineage';
  svg.appendChild(titleEl);
}

// ─────────────────────────────────────────────────────────────
//  DETAIL PANEL
// ─────────────────────────────────────────────────────────────
function selectNode(n, tree) {
  const panel = document.getElementById('detail-panel');
  if(n.id === 'root' || !n.apiVersion){
    panel.innerHTML = `<div class="detail-empty">🌱 <span>${tree.name} — root of the lineage. Select a model node to explore capabilities.</span></div>`;
    return;
  }

  const tierColors = {
    haiku:'#f87171', sonnet:'#fb923c', opus:'#c084fc',
    standard:'#34d399', mini:'#86efac', reasoning:'#60a5fa', 'mini-r':'#a5f3fc',
    pro:'#60a5fa', flash:'#34d399', gemini:'#93c5fd'
  };
  const tc = tierColors[n.tier] || tree.color;

  const feats = TREES[currentProvider].features?.[n.id] || [];
  const statsHtml = [
    { val: n.gpqa||'—',  lbl: 'GPQA Diamond', unit:'%' },
    { val: n.heval||'—', lbl: 'HumanEval',    unit:'%' },
    { val: n.price ? '$'+n.price : '—', lbl: 'Price /M tok out', unit:'' },
  ].map(s=>`
    <div class="dstat">
      <div class="dstat-val" style="color:${tc}">${s.val}<span style="font-size:12px;color:#64748b;font-weight:400">${s.unit&&s.val!=='—'?s.unit:''}</span></div>
      <div class="dstat-lbl">${s.lbl}</div>
    </div>
  `).join('');

  panel.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name" style="color:${tree.lightColor}">${n.label.replace('\n',' ')}</div>
        <div class="detail-api">${n.apiVersion} &nbsp;·&nbsp; ${n.sub}</div>
      </div>
      <div class="detail-tier-badge" style="color:${tc};border-color:${tc}">${n.tier||'model'}</div>
    </div>
    <div class="detail-stats">${statsHtml}</div>
    ${feats.length ? `<div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:700">Key Capabilities</div>
    <div class="detail-features">${feats.map(f=>`<span class="dfeat">✦ ${f}</span>`).join('')}</div>` : ''}
  `;

  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ─────────────────────────────────────────────────────────────
//  PROVIDER SWITCH
// ─────────────────────────────────────────────────────────────
function setProvider(key, btn) {
  currentProvider = key;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('detail-panel').innerHTML =
    '<div class="detail-empty">🌿 Click any branch node to see model details and capabilities</div>';
  drawTree(key);
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
drawTree('anthropic');
</script>
</body>
</html>
