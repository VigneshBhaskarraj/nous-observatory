<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Evolution Tree — Nous Observatory</title>
<style>
:root {
  --bg: #070d1a;
  --pc: #c0622f;
  --pc-dim: #7a3418;
  --pc-light: #f4a87a;
  --pc-glow: rgba(192,98,47,0.3);
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #070d1a;
  color:#d0e0f8;
  display:flex; flex-direction:column;
}

/* ── HEADER ── */
.hdr {
  flex-shrink:0;
  background:rgba(6,10,22,0.92); border-bottom:1px solid rgba(40,80,160,0.25);
  padding:9px 24px; display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(14px); z-index:200; position:relative;
  box-shadow:0 1px 16px rgba(0,60,180,.18);
}
.hdr-left { display:flex; align-items:center; gap:14px; }
.hdr-title { font-size:15px; font-weight:800; letter-spacing:-.3px; color:#a8d0ff; }
.hdr-sub   { font-size:11px; color:#4a7ab0; }
.hdr-links { display:flex; gap:12px; }
.hdr-link  { font-size:11px; color:#5090d0; text-decoration:none; opacity:.7; transition:opacity .2s; }
.hdr-link:hover { opacity:1; }

/* ── PROVIDER TABS ── */
.ptabs {
  flex-shrink:0; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
  padding:8px 16px 5px; position:relative; z-index:10;
}
.ptab {
  padding:4px 20px; border-radius:20px; border:1px solid;
  font-size:10.5px; font-weight:700; cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  background:rgba(10,18,36,0.7); opacity:.45; transform:scale(.95);
  letter-spacing:.3px;
}
.ptab.on { opacity:1; transform:scale(1); }
.ptab.ant { border-color:#c0622f; color:#e08858; }
.ptab.ant.on { background:rgba(192,98,47,.15); box-shadow:0 0 18px rgba(192,98,47,.35); }
.ptab.oai { border-color:#1d8a52; color:#3ab870; }
.ptab.oai.on { background:rgba(29,138,82,.15); box-shadow:0 0 18px rgba(29,138,82,.35); }
.ptab.goo { border-color:#3a85c8; color:#68aae8; }
.ptab.goo.on { background:rgba(58,133,200,.15); box-shadow:0 0 18px rgba(58,133,200,.35); }
.ptab.ali { border-color:#e07830; color:#f0a060; }
.ptab.ali.on { background:rgba(224,120,48,.15); box-shadow:0 0 18px rgba(224,120,48,.35); }
.ptab.moo { border-color:#7c3aed; color:#a870ff; }
.ptab.moo.on { background:rgba(124,58,237,.15); box-shadow:0 0 18px rgba(124,58,237,.35); }
.ptab.dsk { border-color:#1e7a8a; color:#40b8cc; }
.ptab.dsk.on { background:rgba(30,122,138,.15); box-shadow:0 0 18px rgba(30,122,138,.35); }

/* ── MAIN STAGE ── */
.stage { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
#particle-canvas { position:absolute; inset:0; pointer-events:none; z-index:1; }
#tree-svg { position:relative; z-index:2; width:100%; height:100%; cursor:default; transition:filter .4s; }
#tree-svg.zoomed { cursor:zoom-out; }

.zoom-hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:10px; color:rgba(100,160,255,0.35); z-index:5; pointer-events:none;
  transition:opacity .4s; font-style:italic; letter-spacing:.3px;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  flex-shrink:0;
  background:rgba(5,10,24,0.97);
  border-top:1px solid rgba(40,80,180,0.3);
  padding:0; max-height:0; overflow:hidden;
  transition: max-height .45s cubic-bezier(.4,0,.2,1), padding .45s;
  backdrop-filter:blur(20px); z-index:50; position:relative;
  box-shadow:0 -4px 28px rgba(0,40,160,.22);
}
.detail-panel.open { max-height:320px; padding:12px 22px; }
.detail-inner { overflow-y:auto; max-height:292px; display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap; }
.detail-name  { font-size:17px; font-weight:800; line-height:1; color:#d8eaff; }
.detail-api   { font-size:10px; color:#4878a8; font-family:monospace; margin-top:3px; }
.detail-tier  { font-size:10px; font-weight:700; padding:2px 9px; border-radius:10px; border:1px solid; margin-top:5px; display:inline-block; }
.detail-stats { display:flex; gap:8px; flex-wrap:wrap; }
.dstat        { background:rgba(20,40,80,.6); border:1px solid rgba(40,80,180,.25); border-radius:8px; padding:7px 12px; min-width:76px; }
.dstat-val    { font-size:15px; font-weight:700; color:#a8d0ff; }
.dstat-lbl    { font-size:9px; color:#4878a8; text-transform:uppercase; letter-spacing:.4px; margin-top:1px; }
.detail-feats { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.dfeat        { font-size:10px; padding:2px 8px; border-radius:11px; background:rgba(30,60,120,.4); color:#80b0e8; border:1px solid rgba(40,80,180,.3); white-space:nowrap; }
.close-btn    { margin-left:auto; background:none; border:none; color:#4878a8; cursor:pointer; font-size:17px; padding:4px; line-height:1; transition:color .2s; align-self:flex-start; flex-shrink:0; }
.close-btn:hover { color:#c8e0ff; }

/* ── USE CASE SECTION ── */
.usecase-section { border-top:1px solid rgba(40,80,180,.2); padding-top:9px; margin-top:8px; min-width:190px; flex:1; }
.usecase-title { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:#4878a8; font-weight:700; margin-bottom:7px; }
.uc-grid { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:7px; }
.uc-chip { font-size:10px; padding:3px 9px; border-radius:11px; font-weight:600; white-space:nowrap; }
.uc-code     { background:rgba(30,64,175,.3); color:#93c5fd; border:1px solid rgba(59,130,246,.25); }
.uc-reason   { background:rgba(6,95,70,.3);  color:#6ee7b7; border:1px solid rgba(16,185,129,.25); }
.uc-write    { background:rgba(120,53,15,.3); color:#fcd34d; border:1px solid rgba(245,158,11,.25); }
.uc-analysis { background:rgba(76,29,149,.3); color:#c4b5fd; border:1px solid rgba(139,92,246,.25); }
.uc-agent    { background:rgba(153,27,27,.3); color:#fca5a5; border:1px solid rgba(239,68,68,.25); }
.uc-speed    { background:rgba(6,95,70,.25);  color:#34d399; border:1px solid rgba(16,185,129,.2); }
.uc-vision   { background:rgba(3,105,161,.3); color:#7dd3fc; border:1px solid rgba(14,165,233,.25); }
.choose-when { font-size:10px; color:#6ee7b7; line-height:1.5; border-left:2px solid rgba(16,185,129,.4); padding-left:8px; margin-bottom:4px; }
.skip-if     { font-size:10px; color:#fcd34d; line-height:1.5; border-left:2px solid rgba(245,158,11,.35); padding-left:8px; font-style:italic; }

/* ── MILESTONE LIST ── */
.mile-section { border-top:1px solid rgba(40,80,180,.2); padding-top:9px; margin-top:8px; flex:1; min-width:240px; }
.mile-section-title { font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:#4878a8; font-weight:700; margin-bottom:6px; }
.mile-list { display:flex; flex-direction:column; gap:4px; max-height:130px; overflow-y:auto; padding-right:3px; }
.mile-list::-webkit-scrollbar { width:3px; }
.mile-list::-webkit-scrollbar-track { background:transparent; }
.mile-list::-webkit-scrollbar-thumb { background:rgba(40,80,180,.3); border-radius:3px; }
.mile-item { background:rgba(15,30,64,.5); border-radius:6px; padding:5px 8px; border-left:2px solid; cursor:default; transition:background .15s; }
.mile-item:hover { background:rgba(20,40,90,.7); }
.mile-date  { font-size:9px; color:#4878a8; margin-bottom:1px; }
.mile-evt   { font-size:10px; color:#c8deff; line-height:1.4; }
.mile-sig   { font-size:9px; color:#6898c8; margin-top:2px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.mile-chips { display:flex; gap:3px; flex-wrap:wrap; margin-top:3px; }
.mile-chip  { font-size:9px; padding:1px 5px; border-radius:7px; background:rgba(30,60,120,.4); color:#80b0e8; }
.mile-loading { color:#4878a8; font-size:10px; padding:6px 0; }

/* ── TOOLTIP ── */
.tooltip {
  position:fixed; background:rgba(5,10,28,0.97);
  border:1px solid rgba(40,80,200,.35); border-radius:8px; padding:6px 11px; font-size:11px;
  pointer-events:none; z-index:300; opacity:0; transition:opacity .15s;
  backdrop-filter:blur(12px); max-width:200px; box-shadow:0 4px 20px rgba(0,40,180,.3);
  color:#c8deff;
}
.tooltip.show { opacity:1; }
.tt-name { font-weight:700; margin-bottom:2px; color:#a8d0ff; }
.tt-year { color:#4878a8; font-size:10px; }

/* ── ANIMATIONS ── */
@keyframes breathe {
  0%,100% { transform:scale(1); opacity:1; }
  50%      { transform:scale(1.08); opacity:.85; }
}
@keyframes ripple-out {
  0%   { r:6px;  opacity:.7; stroke-width:2; }
  100% { r:40px; opacity:0;  stroke-width:0.5; }
}
@keyframes feat-pop {
  0%   { transform:scale(0) translate(-50%,-50%); opacity:0; }
  60%  { transform:scale(1.15) translate(-50%,-50%); opacity:1; }
  100% { transform:scale(1) translate(-50%,-50%); opacity:1; }
}
@keyframes pulse-ring {
  0%,100% { opacity:.35; transform:scale(1); }
  50%      { opacity:.6;  transform:scale(1.05); }
}
</style>
</head>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div>
      <div class="hdr-title">⬡ Model Evolution Tree</div>
      <div class="hdr-sub">Click any node to zoom · Click again to zoom out</div>
    </div>
  </div>
  <div class="hdr-links">
    <a href="model-advisor.html" class="hdr-link">🤖 Advisor</a>
  </div>
</div>

<!-- PROVIDER TABS -->
<div class="ptabs">
  <button class="ptab ant on" onclick="setProvider('anthropic',this)">Anthropic</button>
  <button class="ptab oai"    onclick="setProvider('openai',this)">OpenAI</button>
  <button class="ptab goo"    onclick="setProvider('google',this)">Google DeepMind</button>
  <button class="ptab ali"    onclick="setProvider('alibaba',this)">Alibaba / Qwen</button>
  <button class="ptab moo"    onclick="setProvider('moonshot',this)">Moonshot / Kimi</button>

</div>

<!-- STAGE -->
<div class="stage" id="stage">
  <canvas id="particle-canvas"></canvas>
  <svg id="tree-svg" viewBox="0 0 820 540" preserveAspectRatio="xMidYMid meet"></svg>

</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-inner" id="detail-inner"></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-year" id="tt-year"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  SUPABASE — live milestones
// ═══════════════════════════════════════════════════════════
const SB  = 'https://yjupiuxuoxmycehkbmwl.supabase.co';
const KEY = 'sb_publishable_RUyNAQRYQq37O0IvOJ9kbQ_Cj8V0Yrr';
const SBH = { apikey:KEY, Authorization:'Bearer '+KEY };
const _provNameMap = { anthropic:'Anthropic', openai:'OpenAI', google:'Google DeepMind', alibaba:'Alibaba AI', moonshot:'Moonshot AI', deepseek:'DeepSeek' };
let _entCache = {};   // name → entity object
let _mileCache = {};  // entityId → milestones[]

async function sbGet(table, qs) {
  const r = await fetch(`${SB}/rest/v1/${table}?${qs}`, { headers:SBH });
  if (!r.ok) return [];
  return r.json();
}

async function getEntityId(provKey) {
  const name = _provNameMap[provKey];
  if (_entCache[name]) return _entCache[name].id;
  const rows = await sbGet('entities', `select=id,name&name=eq.${encodeURIComponent(name)}&limit=1`);
  if (rows[0]) _entCache[name] = rows[0];
  return rows[0]?.id || null;
}

async function getMilestones(provKey) {
  const id = await getEntityId(provKey);
  if (!id) return [];
  if (_mileCache[id]) return _mileCache[id];
  const rows = await sbGet('milestones',
    `select=date,event,significance,strategic_signal,forward_implication_score,claim_type,stack_layer,tags`+
    `&entity_id=eq.${id}&order=date.desc&limit=40`);
  _mileCache[id] = rows;
  return rows;
}

function claimColor(ct) {
  return ct==='demonstrated'?'#10b981':ct==='announced'?'#3b82f6':'#f59e0b';
}

// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
// Use-case decision data keyed by node id
const USECASES = {
  // Anthropic
  c3h:  { chips:[['Speed','uc-speed'],['High volume','uc-code'],['APIs','uc-code']], when:'You need sub-200ms latency at massive scale — customer chat, classification pipelines, or real-time tagging under $0.50/M tokens.', skip:'Complex multi-step reasoning or tasks needing deep judgment. Use Sonnet or Opus instead.' },
  c3s:  { chips:[['Balanced','uc-reason'],['General tasks','uc-analysis']], when:'Solid all-rounder when you want reliable Claude quality without Opus pricing. Good for drafting, summarisation, and lightweight coding.', skip:'If speed is the only constraint (use Haiku), or if the task requires frontier reasoning (use Opus).' },
  c3o:  { chips:[['Complex reasoning','uc-reason'],['Research','uc-analysis'],['Long docs','uc-analysis']], when:'Tasks requiring nuanced judgment: evaluating arguments, scientific reasoning, complex legal analysis. Claude 3\'s ceiling.', skip:'High-throughput or latency-sensitive use cases. At $75/M output, budget carefully.' },
  c35sj:{ chips:[['Coding','uc-code'],['Artifacts','uc-write'],['Vision','uc-vision']], when:'First Claude to reliably build interactive artifacts and handle PDF/image inputs. Good upgrade from Sonnet 3.', skip:'The Oct \'24 version supersedes this. Migrate to 3.5 Sonnet Oct for the same price.' },
  c35so:{ chips:[['Coding agent','uc-agent'],['Computer Use','uc-code'],['Tools','uc-code']], when:'Agentic software workflows: automated code review, CI/CD integration, computer-use pipelines. SWE-bench 49%.', skip:'Simple one-shot queries. The agentic strength is wasted on single-turn tasks.' },
  c35h: { chips:[['Fast','uc-speed'],['Affordable','uc-code'],['Vision','uc-vision']], when:'Cheapest Claude with vision and tool use. Perfect for image-description APIs, mobile AI features, or classification at scale.', skip:'Complex coding or reasoning — this is speed-optimised, not capability-optimised.' },
  ch45: { chips:[['Consumer apps','uc-speed'],['MCP native','uc-agent'],['Low latency','uc-speed']], when:'Consumer-facing Claude apps via MCP. Fastest modern Claude for real-time streaming interactions.', skip:'Tasks needing extended thinking or complex multi-step planning.' },
  cs45: { chips:[['Advanced coding','uc-code'],['Extended thinking','uc-reason'],['Hard problems','uc-reason']], when:'Extended thinking mode for problems that need step-by-step deliberation: competition math, architectural decisions, research-grade code. SWE-bench ~72%.', skip:'Straightforward tasks. Extended thinking costs extra tokens — only worth it when the problem is genuinely hard.' },
  cs46: { chips:[['Latest Sonnet','uc-reason'],['Coding','uc-code'],['Extended thinking','uc-reason']], when:'Current best Sonnet. Choose for anything you\'d use Claude Sonnet for — now with the latest capability and safety improvements.', skip:'If cost is very tight, cs45 performs similarly at the same price.' },
  co45: { chips:[['Research grade','uc-analysis'],['Complex reasoning','uc-reason'],['Long context','uc-analysis']], when:'Highest-stakes reasoning: legal review, medical research synthesis, financial modelling with nuanced judgment. Best Claude for deep thinking.', skip:'Anything requiring fast turnaround or high throughput. Opus is for quality-over-speed workflows.' },
  co46: { chips:[['Best Claude','uc-reason'],['Research','uc-analysis'],['Judgment','uc-reason']], when:'When you need the absolute best Anthropic can offer. Frontier research, complex multi-document analysis, or critical decisions where quality is everything.', skip:'Routine tasks. Use this when you\'ve already tried Sonnet and it wasn\'t enough.' },
  co47: { chips:[['Frontier Claude','uc-reason'],['Coding','uc-code'],['Vision','uc-analysis']], when:'Latest Opus with benchmark-leading coding and 3x vision capacity (3.75 megapixel image resolution). Available simultaneously on Anthropic API, Amazon Bedrock, Google Vertex AI, and Microsoft Foundry.', skip:'Routine tasks. Use Sonnet 4.6 unless you need Opus-tier quality.' },
  // OpenAI
  gpt4: { chips:[['General','uc-analysis'],['Foundation','uc-reason']], when:'Historical reference — GPT-4 set the standard. Most use cases better served by gpt-4o now.', skip:'Modern use: gpt-4o outperforms at lower cost.' },
  gpt4om:{ chips:[['Multimodal','uc-vision'],['Fast','uc-speed'],['Native audio','uc-write']], when:'Native audio/video processing or real-time multimodal tasks. First GPT-4 class model with genuine voice capability.', skip:'Text-only tasks — gpt-4o Aug or gpt-4o-mini is cheaper.' },
  gpt4oa:{ chips:[['Structured output','uc-code'],['Best GPT-4o','uc-reason'],['JSON mode','uc-code']], when:'Current recommended GPT-4o. Reliable structured outputs and improved instruction following. Good default for most OpenAI use cases.', skip:'Heavy reasoning tasks — the o-series models are dramatically better.' },
  gpt4mini:{ chips:[['Cheap','uc-speed'],['Fast','uc-speed'],['Vision','uc-vision']], when:'Budget-constrained high-volume tasks. GPT-4o class vision at 1/25th the price. Best OpenAI option for classification and extraction at scale.', skip:'Complex reasoning, long-chain problems, or when you need o-series quality.' },
  o1:   { chips:[['Chain of thought','uc-reason'],['Science','uc-analysis'],['Math','uc-reason']], when:'First "reasoning model" — deliberately thinks before responding. Use for STEM problems, code debugging, or multi-step logic where GPT-4o makes errors.', skip:'Quick factual queries or creative writing. o1 is slower and more expensive than GPT-4o.' },
  o3:   { chips:[['Best reasoning','uc-reason'],['Research','uc-analysis'],['SWE-bench 71%','uc-code']], when:'OpenAI\'s current reasoning frontier. Complex software engineering, advanced research, and problems that stumped o1. GPQA 87.7%.', skip:'Cost-sensitive tasks. o3 is expensive — use o4-mini for most coding/reasoning needs.' },
  o4mini:{ chips:[['Fast reasoning','uc-reason'],['Coding','uc-code'],['Affordable','uc-speed']], when:'Best price-performance for reasoning tasks. 80%+ of o3 quality at 1/10th the cost. Most enterprise reasoning use cases.', skip:'Creative writing, simple Q&A. The reasoning overhead isn\'t needed.' },
  // Alibaba / Qwen
  qwen7b:   { chips:[['Open weights','uc-code'],['Baseline','uc-analysis']], when:'Lightweight self-hosted inference. Qwen-7B fits on consumer GPU; good for private document processing or edge deployments.', skip:'Production-grade tasks — Qwen2.5 or Qwen3 delivers dramatically better quality.' },
  qwen14b:  { chips:[['Mid-size OSS','uc-code'],['Multilingual','uc-analysis']], when:'Chinese + English bilingual tasks at mid-size scale. Better reasoning than 7B, still fits on one A100.', skip:'Cost-sensitive API tasks — hosted Qwen APIs are often cheaper than self-hosting 14B.' },
  qwen2_72b:{ chips:[['Strong OSS','uc-reason'],['Multilingual','uc-analysis'],['Function calling','uc-code']], when:'Best open-weights Chinese model at launch. Function calling + long context made it competitive with GPT-4o for structured tasks.', skip:'Qwen2.5 supersedes for most use cases. Only choose if you need proven stability.' },
  qwen25_72b:{ chips:[['Coding','uc-code'],['Math','uc-reason'],['128K context','uc-analysis']], when:'Major capability jump over Qwen2. Top open-weights model for coding + math. 128K context for long documents.', skip:'If you need MoE efficiency — QwQ-32B or Qwen3-235B are better choices at similar open access.' },
  qwq32b:   { chips:[['Reasoning','uc-reason'],['Math','uc-reason'],['Chain-of-thought','uc-analysis']], when:'Alibaba\'s o1-equivalent. Strong at competition math, scientific reasoning, and multi-step logic. Surprises at 32B scale.', skip:'Creative writing or fast responses — the extended reasoning overhead is wasteful for simple tasks.' },
  qwen3_235b:{ chips:[['Flagship','uc-reason'],['Thinking mode','uc-reason'],['MoE','uc-code']], when:'Alibaba\'s frontier: 235B MoE (22B active). Global SOTA on several benchmarks. Thinking mode for hard problems; non-thinking for fast responses.', skip:'If you need a fully open model for fine-tuning — the full MoE weights are large. Use Qwen3-32B instead.' },
  // Moonshot / Kimi
  kimiv1:   { chips:[['Long context','uc-analysis'],['Chinese LLM','uc-analysis']], when:'First major long-context Chinese model. Good for reading lengthy PDFs, legal docs, or books in Chinese or English.', skip:'Superseded by Kimi 1.5 and Kimi k1.5. Only choose for backward compatibility.' },
  kimi1m:   { chips:[['1M context','uc-analysis'],['Long doc','uc-analysis']], when:'When you need to ingest entire repositories, book-length reports, or multi-hour transcripts in one pass. Few models match this context window.', skip:'Short-context tasks — the 1M window adds latency and cost overhead for standard queries.' },
  kimik15:  { chips:[['Reasoning','uc-reason'],['Multimodal','uc-vision'],['Long thinking','uc-reason']], when:'Moonshot\'s o1-equivalent. Strong math + code reasoning with chain-of-thought. Competitive with o1 on some STEM benchmarks.', skip:'Latency-sensitive tasks — extended reasoning adds significant response time.' },
  kimi25:   { chips:[['Latest Kimi','uc-reason'],['Vision','uc-vision'],['Agentic','uc-agent']], when:'Moonshot\'s current flagship. Improved reasoning + multimodal understanding. Best Kimi for agentic workflows and coding tasks.', skip:'Simple Q&A or translation — lighter models are more cost-efficient for those.' },
  // DeepSeek
  ds1:      { chips:[['Open weights','uc-code'],['MoE','uc-code']], when:'First notable DeepSeek open model. Showed that high-quality LLMs could be trained at fraction of typical cost.', skip:'R1 and V3 are dramatically better. Historical reference point only.' },
  ds2:      { chips:[['MoE pioneer','uc-code'],['Efficient','uc-speed'],['236B MoE','uc-analysis']], when:'Groundbreaking MoE efficiency at 236B (21B active). Changed the conversation on training cost vs. quality trade-offs.', skip:'V3 surpasses in quality. Use V3 or R1 for production tasks.' },
  dsv3:     { chips:[['Coding','uc-code'],['Open weights','uc-code'],['Efficient','uc-speed']], when:'Highly capable open-weights model at GPT-4o class performance. Excellent for code generation and instruction following at low cost.', skip:'Deep reasoning tasks — R1 with chain-of-thought outperforms V3 on complex multi-step problems.' },
  dsr1:     { chips:[['Best open reasoning','uc-reason'],['Math','uc-reason'],['MIT License','uc-code']], when:'Open-weights reasoning model that matched o1 on key STEM benchmarks — a landmark moment for open-source AI. MIT licensed, fully distillable.', skip:'Conversational or creative tasks. R1 thinks in chains; overkill for simple queries.' },
  // Google

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  const stage = document.getElementById('stage');
  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
}

// Tech particle system: data orbs + neural sparks + stream traces
class Particle {
  constructor(type){ this.type=type; this.reset(true); }
  reset(init=false){
    const tree=TREES[currentProvider];
    if(this.type==='orb'){
      this.x = Math.random()*canvas.width;
      this.y = init ? Math.random()*canvas.height : canvas.height+8;
      this.vy = -(0.15+Math.random()*0.3);
      this.vx = (Math.random()-.5)*0.2;
      this.size = 1+Math.random()*2.5;
      this.alpha = 0; this.targetAlpha = 0.2+Math.random()*0.5;
      this.t = Math.random()*Math.PI*2; this.wobble=0.015+Math.random()*0.02;
      // Use provider color with a blue/white mix
      this.hue = 180+Math.random()*80; // cyan-blue range
    } else if(this.type==='spark'){
      this.x = Math.random()*canvas.width;
      this.y = Math.random()*canvas.height;
      this.life = 0; this.maxLife = 40+Math.random()*80;
      this.size = 0.5+Math.random()*1.5;
      this.alpha = 0;
      this.hue = 160+Math.random()*120;
    } else { // stream — data packet traveling upward
      this.x = 40+Math.random()*(canvas.width-80);
      this.y = init ? Math.random()*canvas.height : canvas.height+4;
      this.vy = -(0.8+Math.random()*1.4);
      this.len = 6+Math.random()*20;
      this.alpha = 0.3+Math.random()*0.5;
      this.hue = 200+Math.random()*60;
      this.width = 0.5+Math.random()*0.8;
    }
  }
  update(){
    if(this.type==='orb'){
      this.t+=this.wobble;
      this.x+=this.vx+Math.sin(this.t)*0.4;
      this.y+=this.vy;
      this.alpha+=(this.targetAlpha-this.alpha)*0.025;
      if(Math.random()<0.003) this.targetAlpha=0.1+Math.random()*0.5;
      if(this.y<-6) this.reset();
    } else if(this.type==='spark'){
      this.life++;
      if(this.life<this.maxLife*0.2) this.alpha = this.life/(this.maxLife*0.2)*0.8;
      else if(this.life>this.maxLife*0.7) this.alpha = (1-(this.life-this.maxLife*0.7)/(this.maxLife*0.3))*0.8;
      else this.alpha = 0.8;
      if(this.life>=this.maxLife) this.reset();
    } else {
      this.y+=this.vy;
      this.alpha*=0.997;
      if(this.y<-this.len-4) this.reset();
    }
  }
  draw(){
    const tree=TREES[currentProvider];
    ctx.save(); ctx.globalAlpha=this.alpha;
    if(this.type==='orb'){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,`hsla(${this.hue},90%,80%,0.9)`);
      g.addColorStop(0.4,`hsla(${this.hue},80%,60%,0.4)`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${this.hue},100%,90%,0.95)`;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*0.5,0,Math.PI*2); ctx.fill();
    } else if(this.type==='spark'){
      ctx.fillStyle=`hsla(${this.hue},90%,75%,1)`;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
      // Soft halo
      ctx.globalAlpha=this.alpha*0.3;
      ctx.fillStyle=`hsla(${this.hue},80%,70%,1)`;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size*3,0,Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle=`hsla(${this.hue},90%,70%,1)`;
      ctx.lineWidth=this.width;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x,this.y+this.len);
      ctx.stroke();
      // Bright head
      ctx.globalAlpha=this.alpha*1.4;
      ctx.strokeStyle=`hsla(${this.hue},100%,88%,1)`;
      ctx.lineWidth=this.width*1.5;
      ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x,this.y+3); ctx.stroke();
    }
    ctx.restore();
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<35;i++) particles.push(new Particle('orb'));
  for(let i=0;i<20;i++) particles.push(new Particle('spark'));
  for(let i=0;i<15;i++) particles.push(new Particle('stream'));
}

function getDepth(nodeMap, id){
  let d=0,cur=id;
  while(nodeMap[cur]?.parent){cur=nodeMap[cur].parent;d++;}
  return d;
}

function drawTree(provKey, animate=true){
  svg.innerHTML='';
  const tree = TREES[provKey];
  const nodes = tree.nodes;
  const nMap={}; nodes.forEach(n=>nMap[n.id]=n);

  // ── CSS vars ──────────────────────────────────────────────
  document.documentElement.style.setProperty('--pc', tree.color);
  document.documentElement.style.setProperty('--pc-dim', tree.dim);
  document.documentElement.style.setProperty('--pc-light', tree.light);
  document.documentElement.style.setProperty('--pc-glow', tree.glow);

  // ── Defs ─────────────────────────────────────────────────
  const defs = el('defs',{},svg);

  // Node glow
  const fg=el('filter',{id:'fg',x:'-80%',y:'-80%',width:'260%',height:'260%'},defs);
  el('feGaussianBlur',{stdDeviation:'5',result:'b',in:'SourceGraphic'},fg);
  const fm=el('feMerge',{},fg);
  el('feMergeNode',{in:'b'},fm); el('feMergeNode',{in:'SourceGraphic'},fm);

  // Strong glow for latest
  const fgS=el('filter',{id:'fgS',x:'-150%',y:'-150%',width:'400%',height:'400%'},defs);
  el('feGaussianBlur',{stdDeviation:'8',result:'b2',in:'SourceGraphic'},fgS);
  const fm2=el('feMerge',{},fgS);
  el('feMergeNode',{in:'b2'},fm2); el('feMergeNode',{in:'SourceGraphic'},fm2);

  // Feather for leaves
  const fLeaf=el('filter',{id:'fLeaf',x:'-60%',y:'-60%',width:'220%',height:'220%'},defs);
  el('feGaussianBlur',{stdDeviation:'1.5',result:'bl',in:'SourceGraphic'},fLeaf);
  const fm3=el('feMerge',{},fLeaf);
  el('feMergeNode',{in:'bl'},fm3); el('feMergeNode',{in:'SourceGraphic'},fm3);

  // Ground radial glow
  const rg=el('radialGradient',{id:'rg',cx:'50%',cy:'100%',r:'40%'},defs);
  el('stop',{offset:'0%','stop-color':tree.color,'stop-opacity':'0.12'},rg);
  el('stop',{offset:'100%','stop-color':tree.color,'stop-opacity':'0'},rg);

  // Branch gradient — dim at root, bright at tips (PCB trace feel)
  const bg=el('linearGradient',{id:'bgrad',x1:'0',y1:'1',x2:'0',y2:'0'},defs);
  el('stop',{offset:'0%','stop-color':tree.dim,'stop-opacity':'0.5'},bg);
  el('stop',{offset:'50%','stop-color':tree.color,'stop-opacity':'0.8'},bg);
  el('stop',{offset:'100%','stop-color':tree.light,'stop-opacity':'1'},bg);

  // Glow filter for branches
  const bf=el('filter',{id:'bf',x:'-100%',y:'-100%',width:'300%',height:'300%'},defs);
  el('feGaussianBlur',{stdDeviation:'3',result:'gb',in:'SourceGraphic'},bf);
  const bfm=el('feMerge',{},bf);
  el('feMergeNode',{in:'gb'},bfm); el('feMergeNode',{in:'SourceGraphic'},bfm);

  // ── Background: dark neural network space ────────────────────
  // Base fill
  el('rect',{x:0,y:0,width:820,height:540,fill:'#060c1a'},svg);

  // Deep ambient glow — shifts with provider color
  const ambG=el('radialGradient',{id:'ambG',cx:'50%',cy:'60%',r:'55%'},defs);
  el('stop',{offset:'0%','stop-color':tree.color,'stop-opacity':'0.06'},ambG);
  el('stop',{offset:'100%','stop-color':'#060c1a','stop-opacity':'0'},ambG);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#ambG)'},svg);

  // Secondary glow upper-right
  const ambG2=el('radialGradient',{id:'ambG2',cx:'82%',cy:'15%',r:'30%'},defs);
  el('stop',{offset:'0%','stop-color':'#1a3a80','stop-opacity':'0.15'},ambG2);
  el('stop',{offset:'100%','stop-color':'#060c1a','stop-opacity':'0'},ambG2);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#ambG2)'},svg);

  // Subtle dot grid
  const gridG=el('pattern',{id:'dotGrid',width:'40',height:'40',patternUnits:'userSpaceOnUse'},defs);
  el('circle',{cx:'20',cy:'20',r:'0.7',fill:'#ffffff',opacity:'0.08'},gridG);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#dotGrid)'},svg);

  // Horizontal scan line (very subtle, adds tech depth)
  for(let y=0;y<540;y+=80){
    el('line',{x1:0,y1:y,x2:820,y2:y,stroke:'#1a3060','stroke-width':'0.4',opacity:'0.3'},svg);
  }

  // Constellation star field (random bright dots)
  const starSeeds=[[42,28],[115,62],[198,18],[287,44],[355,24],[420,55],[510,32],[608,20],[700,50],[760,30],
    [80,110],[160,140],[340,90],[480,110],[640,80],[730,120],[50,200],[220,185],[520,170],[780,200]];
  starSeeds.forEach(([sx,sy])=>{
    const r=Math.random()*0.8+0.3;
    el('circle',{cx:sx,cy:sy,r:r,fill:'#ffffff',opacity:(0.2+Math.random()*0.5).toFixed(2)},svg);
  });

  // Faint nebula wisps
  const neb1=el('radialGradient',{id:'neb1',cx:'25%',cy:'30%',r:'20%'},defs);
  el('stop',{offset:'0%','stop-color':'#2040a0','stop-opacity':'0.08'},neb1);
  el('stop',{offset:'100%','stop-color':'transparent','stop-opacity':'0'},neb1);
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#neb1)'},svg);

  // Ground glow under tree (provider color)
  el('rect',{x:0,y:0,width:820,height:540,fill:'url(#rg)'},svg);

  // ── Groups ────────────────────────────────────────────────
  const gBranches  = el('g',{id:'branches'},svg);
  const gPathTrace = el('g',{id:'path-trace'},svg);
  const gRipples   = el('g',{id:'ripples'},svg);
  const gLeaves    = el('g',{id:'leaf-clusters'},svg);
  const gNodes     = el('g',{id:'nodes'},svg);
  const gFeatChips = el('g',{id:'feat-chips'},svg);

  // ── Ground — circuit base ────────────────────────────────
  el('ellipse',{cx:410,cy:524,rx:70,ry:10,fill:tree.color,opacity:'0.08'},gBranches);
  el('ellipse',{cx:410,cy:524,rx:40,ry:5,fill:tree.color,opacity:'0.18'},gBranches);
  // Circuit traces spreading from base
  const traceAngles=[180,160,145,195,215,200,170];
  traceAngles.forEach((ang,i)=>{
    const rad=ang*Math.PI/180;
    const len=20+i%3*10;
    const ex=410+Math.cos(rad)*len, ey=518+Math.sin(rad)*len*0.4;
    el('line',{x1:410,y1:518,x2:ex,y2:ey,
      stroke:tree.color,'stroke-width':'1',opacity:(0.2+i%3*0.1).toFixed(2),'stroke-linecap':'square'},gBranches);
    // Terminal dot on trace
    if(i%2===0) el('circle',{cx:ex,cy:ey,r:'1.5',fill:tree.light,opacity:'0.3'},gBranches);
  });

  // ── Branches ─────────────────────────────────────────────
  const branchEls=[];
  const branchNodes=nodes.filter(n=>n.parent).sort((a,b)=>getDepth(nMap,a.id)-getDepth(nMap,b.id));

  branchNodes.forEach(n=>{
    const p=nMap[n.parent];
    const depth=getDepth(nMap,n.id);
    const swMap=[12,8,5.5,4,3,2.5];
    const sw=swMap[Math.min(depth,swMap.length-1)];

    // Organic bezier — natural growth feel
    const dx=n.x-p.x, dy=n.y-p.y;
    const cp1x=p.x+dx*0.15, cp1y=p.y+dy*0.42;
    const cp2x=p.x+dx*0.82, cp2y=p.y+dy*0.58;
    const d=`M${p.x} ${p.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${n.x} ${n.y}`;

    // Outer glow
    el('path',{d,fill:'none',stroke:tree.color,'stroke-width':sw+4,
      'stroke-linecap':'round',opacity:'0.10',filter:'url(#bf)'},gBranches);
    // Main branch
    const bEl=el('path',{d,fill:'none',stroke:'url(#bgrad)',
      'stroke-width':sw,'stroke-linecap':'round',
      opacity: n.isLatest?'1':'0.78',
      'data-branch':n.id},gBranches);
    // Bright highlight hairline
    el('path',{d,fill:'none',stroke:tree.light,'stroke-width':'0.7',
      'stroke-linecap':'round',
      opacity: n.isLatest?'0.45':'0.18'},gBranches);

    // Animate growth
    if(animate){
      try {
        const len=bEl.getTotalLength();
        bEl.style.strokeDasharray=len;
        bEl.style.strokeDashoffset=len;
        const delay=depth*180+Math.random()*80;
        bEl.style.transition=`stroke-dashoffset ${0.6+depth*0.12}s ease-out ${delay}ms`;
        requestAnimationFrame(()=>{ bEl.style.strokeDashoffset='0'; });
      } catch(e){}
    }
    branchEls.push({el:bEl,nodeId:n.id});
  });

  // ── Data-burst indicators on terminal nodes ──────────────
  const childIds=new Set(nodes.filter(n=>n.parent).map(n=>n.parent));
  const terminals=nodes.filter(n=>!childIds.has(n.id)&&n.id!=='root');

  terminals.forEach(n=>{
    const burstG=el('g',{'data-burst-for':n.id},gLeaves);
    const spokes=6;
    for(let i=0;i<spokes;i++){
      const ang=(i/spokes)*Math.PI*2;
      const len=14+i%3*5;
      const x1=Math.cos(ang)*(n.r+2), y1=Math.sin(ang)*(n.r+2);
      const x2=Math.cos(ang)*(n.r+len), y2=Math.sin(ang)*(n.r+len);
      el('line',{x1:n.x+x1,y1:n.y+y1,x2:n.x+x2,y2:n.y+y2,
        stroke:tree.color,'stroke-width':'0.8',
        opacity:(0.12+i*0.04).toFixed(2),'stroke-linecap':'round'},burstG);
      // Small dot at spoke tip
      if(i%2===0){
        el('circle',{cx:n.x+x2,cy:n.y+y2,r:'1.2',
          fill:tree.light,opacity:'0.25'},burstG);
      }
    }
  });

  // ── Nodes ────────────────────────────────────────────────
  nodes.forEach(n=>{
    const isRoot=n.id==='root';
    const isLatest=n.isLatest;
    const isTerm=!childIds.has(n.id)&&!isRoot;
    const depth=getDepth(nMap,n.id);
    const nodeG=el('g',{
      transform:`translate(${n.x},${n.y})`,
      style:'cursor:pointer',
      'data-nid':n.id
    },gNodes);

    // Outer glow aura (large soft halo — solder point on PCB)
    const auraR = isLatest ? n.r+14 : isRoot ? n.r+10 : n.r+7;
    el('circle',{cx:0,cy:0,r:auraR,
      fill:tree.color,opacity: isLatest?'0.12':isRoot?'0.10':'0.07',
      filter:'url(#fgS)'},nodeG);

    // Outer pulse ring (latest nodes only)
    if(isLatest){
      el('circle',{cx:0,cy:0,r:n.r+9,fill:'none',
        stroke:tree.light,'stroke-width':'1.2',
        opacity:'0.4',
        style:`animation:pulse-ring ${2+n.r*0.1}s ease-in-out infinite`},nodeG);
      el('circle',{cx:0,cy:0,r:n.r+18,fill:'none',
        stroke:tree.color,'stroke-width':'0.6',opacity:'0.15',
        style:`animation:pulse-ring ${3+n.r*0.12}s ease-in-out 0.6s infinite`},nodeG);
    }

    // Node body — dark core with bright rim (solder pad feel)
    const fillC = `rgba(5,10,26,0.95)`;
    const strokeC = isLatest ? tree.light : isRoot ? tree.color : tree.color;
    const strokeW = isLatest ? '2' : isRoot ? '2' : '1.2';
    const strokeOp = isLatest ? '0.95' : isRoot ? '0.85' : '0.55';
    el('circle',{cx:0,cy:0,r:n.r,fill:fillC,stroke:strokeC,
      'stroke-width':strokeW,'stroke-opacity':strokeOp,
      filter: isLatest?'url(#fgS)':'url(#fg)',
      style: isTerm?`animation:breathe ${2.5+depth*0.2}s ease-in-out ${n.x%1.5}s infinite`:''
    },nodeG);

    // Inner colored ring (second PCB pad ring)
    el('circle',{cx:0,cy:0,r:n.r-3,fill:'none',
      stroke:tree.color,'stroke-width':'1',
      opacity: isLatest?'0.35':isRoot?'0.25':'0.15'},nodeG);

    // Bright center dot (via hole on PCB)
    const dotR = isRoot ? 3 : isLatest ? 2.5 : 1.8;
    el('circle',{cx:0,cy:0,r:dotR,
      fill: isLatest ? tree.light : tree.color,
      opacity: isLatest?'1':'0.7'},nodeG);

    // Label above node — light text on dark node
    const lines=n.label.split('\n');
    lines.forEach((line,idx)=>{
      const offset = lines.length>1 ? (idx===0?-(n.r+12):-(n.r+4)) : -(n.r+9);
      const t=el('text',{x:0,y:offset,'text-anchor':'middle',
        'font-size': isRoot?'9':'8',
        'font-weight': isLatest||isRoot?'800':'600',
        fill: isRoot ? tree.light : isLatest ? '#f0f8ff' : '#b8d4f8',
        'paint-order':'stroke',
        stroke:'rgba(4,8,22,0.7)',
        'stroke-width':'2','stroke-linejoin':'round'
      },nodeG);
      t.textContent=line;
    });

    // Year below — tech blue-gray
    if(!isRoot){
      const yt=el('text',{x:0,y:n.r+11,'text-anchor':'middle',
        'font-size':'7.5', fill:'#4878a8'
      },nodeG);
      yt.textContent=n.sub.split('·')[0].trim();
    }

    // ── Events ────────────────────────────────────────────
    nodeG.addEventListener('mouseenter', e=>{
      document.getElementById('tt-name').textContent=n.label.replace('\n',' ');
      document.getElementById('tt-year').textContent=(n.api||'')+' · '+n.sub;
      const tt=document.getElementById('tooltip');
      tt.style.setProperty('border-color',tree.color);
      tt.classList.add('show');
      // Highlight path
      highlightPath(n.id, tree, nMap);
    });
    nodeG.addEventListener('mousemove', e=>{
      const tt=document.getElementById('tooltip');
      tt.style.left=(e.clientX+15)+'px';
      tt.style.top=(e.clientY-8)+'px';
    });
    nodeG.addEventListener('mouseleave', ()=>{
      document.getElementById('tooltip').classList.remove('show');
      clearPathHighlight();
    });
    nodeG.addEventListener('click', e=>{
      e.stopPropagation();
      if(selectedNodeId===n.id && isZoomed){ zoomOut(); return; }
      selectedNodeId=n.id;
      ripple(n.x, n.y, tree.color, gRipples);
      if(!n.id||n.id!=='root') zoomToNode(n);
      showFeatChips(n, tree, nMap, gFeatChips);
      showDetail(n, tree);  // async — renders panel immediately, then fills milestones
    });
  });

  // Click background to zoom out
  svg.addEventListener('click', ()=>{ if(isZoomed) zoomOut(); });

  // Title
  const titleEl=el('text',{x:806,y:22,'text-anchor':'end','font-size':'12',
    'font-weight':'700',fill:tree.color,opacity:'0.5'},svg);
  titleEl.textContent=tree.name+' · Evolution Tree';
}

// ═══════════════════════════════════════════════════════════
//  PATH HIGHLIGHT
// ═══════════════════════════════════════════════════════════
function getPathToRoot(nodeId, nMap){
  const path=[]; let cur=nodeId;
  while(nMap[cur]){path.push(nMap[cur]); cur=nMap[cur].parent; if(!cur) break;}
  return path;
}

function highlightPath(nodeId, tree, nMap){
  clearPathHighlight();
  const pathNodes=getPathToRoot(nodeId, nMap);
  const g=document.getElementById('path-trace');
  if(!g) return;

  for(let i=1;i<pathNodes.length;i++){
    const child=pathNodes[i-1], par=pathNodes[i];
    const dx=child.x-par.x, dy=child.y-par.y;
    const cp1x=par.x+dx*.15, cp1y=par.y+dy*.42;
    const cp2x=par.x+dx*.82, cp2y=par.y+dy*.58;
    const d=`M${par.x} ${par.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${child.x} ${child.y}`;

    const glow=el('path',{d,fill:'none',stroke:tree.light,'stroke-width':'6',
      'stroke-linecap':'round',opacity:'0.35',class:'path-trace-el'},g);
    const bright=el('path',{d,fill:'none',stroke:'#fff','stroke-width':'2',
      'stroke-linecap':'round',opacity:'0.6',class:'path-trace-el'},g);

    try {
      const len=glow.getTotalLength();
      [glow,bright].forEach(pe=>{
        pe.style.strokeDasharray=len; pe.style.strokeDashoffset=len;
        pe.style.transition=`stroke-dashoffset 0.35s ease-out ${(i-1)*80}ms`;
        requestAnimationFrame(()=>{ pe.style.strokeDashoffset='0'; });
      });
    } catch(e){}
  }
}

function clearPathHighlight(){
  const g=document.getElementById('path-trace');
  if(g) g.innerHTML='';
}

// ═══════════════════════════════════════════════════════════
//  RIPPLE
// ═══════════════════════════════════════════════════════════
function ripple(x, y, color, group){
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const c=el('circle',{cx:x,cy:y,r:'6',fill:'none',stroke:color,
        'stroke-width':'2',opacity:'0.9'},group);
      c.animate([
        {r:'6px',opacity:'0.8','stroke-width':'2px'},
        {r:'45px',opacity:'0','stroke-width':'0.5px'}
      ],{duration:700+i*150,easing:'ease-out',fill:'forwards'})
      .onfinish=()=>c.remove();
    },i*120);
  }
}

// ═══════════════════════════════════════════════════════════
//  FEATURE CHIPS RADIATE FROM NODE
// ═══════════════════════════════════════════════════════════
function showFeatChips(node, tree, nMap, group){
  group.innerHTML='';
  const feats=TREES[currentProvider].feats?.[node.id]||[];
  if(!feats.length) return;

  const count=feats.length;
  feats.forEach((feat,i)=>{
    const angle=(i/(count))*(Math.PI*1.2)-Math.PI*1.1;
    const dist=75+Math.floor(i/4)*30;
    const tx=node.x+Math.cos(angle)*dist;
    const ty=node.y+Math.sin(angle)*dist;

    const chipG=el('g',{transform:`translate(${node.x},${node.y})`,opacity:'0'},group);

    // Chip background — dark glass with provider accent (compact)
    const w=feat.length*4.8+16, h=15;
    el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:'7',
      fill:'rgba(6,12,30,0.92)',stroke:tree.color,'stroke-width':'0.7','stroke-opacity':'0.65'},chipG);
    // Data dot
    el('circle',{cx:-w/2+7,cy:0,r:2,fill:tree.light,opacity:'0.75'},chipG);
    // Text
    const ft=el('text',{x:-w/2+14,y:3,'font-size':'7.5','font-weight':'600',
      fill:'#90b8e0'},chipG);
    ft.textContent=feat;

    // Connector line (behind chip)
    el('line',{x1:0,y1:0,x2:tx-node.x,y2:ty-node.y,
      stroke:tree.color,'stroke-width':'0.5',opacity:'0.2',
      'stroke-dasharray':'2,3'},chipG);

    // Animate out
    chipG.style.transition=`transform .5s cubic-bezier(.34,1.56,.64,1) ${i*60}ms, opacity .3s ${i*60}ms`;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        chipG.setAttribute('transform',`translate(${tx},${ty})`);
        chipG.setAttribute('opacity','1');
      });
    });

    // Hover effect
    chipG.style.cursor='pointer';
    chipG.addEventListener('mouseenter',()=>{
      chipG.querySelector('rect')?.setAttribute('fill','rgba(14,28,64,0.97)');
    });
    chipG.addEventListener('mouseleave',()=>{
      chipG.querySelector('rect')?.setAttribute('fill','rgba(6,12,30,0.92)');
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════
// easeOutBack — slight organic overshoot at destination (dolly-settle feel)
function easeOutBack(t){
  const c1=1.50158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}
// easeInOutQuart — smooth pull-back on zoom-out
function easeInOutQuart(t){
  return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
}

function animVB(from, to, dur=520, easing=easeOutBack, cb){
  const start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    const e=easing(t);
    const cur=from.map((f,i)=>f+(to[i]-f)*e);
    svg.setAttribute('viewBox',cur.join(' '));
    currentVB=[...cur];
    if(t<1) requestAnimationFrame(frame);
    else { currentVB=[...to]; svg.setAttribute('viewBox',to.join(' ')); if(cb) cb(); }
  }
  requestAnimationFrame(frame);
}

// Scale all text labels inversely to keep them small & readable when zoomed
function scaleLabels(zoomFactor){
  svg.querySelectorAll('text').forEach(t=>{
    const base = parseFloat(t.getAttribute('data-bfs') || t.getAttribute('font-size') || 9);
    if(!t.getAttribute('data-bfs')) t.setAttribute('data-bfs', base);
    t.setAttribute('font-size', Math.max(5.5, base/zoomFactor));
  });
}
function restoreLabels(){
  svg.querySelectorAll('text').forEach(t=>{
    const base=t.getAttribute('data-bfs');
    if(base) t.setAttribute('font-size', base);
  });
}

function zoomToNode(n){
  isZoomed=true;
  svg.classList.add('zoomed');
  document.getElementById('zoom-hint').style.opacity='0.3';
  // Brief motion blur during travel
  svg.style.filter='blur(1.5px)';
  const zw=300, zh=240;
  const zoomFactor = VB_FULL[2]/zw; // ~2.73x
  animVB(currentVB,[n.x-zw/2,n.y-zh/2,zw,zh],540,easeOutBack,()=>{
    svg.style.filter='none';
    scaleLabels(zoomFactor);
  });
}

function zoomOut(){
  isZoomed=false; selectedNodeId=null;
  svg.classList.remove('zoomed');
  document.getElementById('zoom-hint').style.opacity='1';
  document.getElementById('feat-chips').innerHTML='';
  clearPathHighlight();
  restoreLabels();
  animVB(currentVB,VB_FULL,560,easeInOutQuart);
  closeDetail();
}

// ═══════════════════════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════════════════════
async function showDetail(n, tree){
  const panel=document.getElementById('detail-panel');
  const inner=document.getElementById('detail-inner');
  const isRoot = n.id==='root';
  // Tier colours adapted to light theme (readable on cream background)
  const tc={ haiku:'#e08858',sonnet:'#5aabf0',opus:'#b080f0',
    standard:'#3ab870',mini:'#3ab870',reasoning:'#68aae8','mini-r':'#60a0e0',
    flagship:'#f0c060',pro:'#5aabf0',flash:'#3ab870',gemini:'#60a0e0',
    early:'#6898c8',root:tree.color }[n.tier]||tree.color;

  const feats=TREES[currentProvider].feats?.[n.id]||[];
  const uc=USECASES[n.id]; // use-case decision data

  if(isRoot){
    inner.innerHTML=`
      <div style="min-width:200px">
        <div class="detail-name">${tree.name}</div>
        <div class="detail-api">AI Knowledge Graph · ${new Date().getFullYear()}</div>
        <span class="detail-tier" style="color:${tree.color};border-color:${tree.color}">company</span>
      </div>
      <div class="mile-section">
        <div class="mile-section-title">📡 Major Milestones & Announcements</div>
        <div class="mile-list" id="mile-list"><div class="mile-loading">Loading live data…</div></div>
      </div>
      <button class="close-btn" onclick="zoomOut()" title="Close">×</button>
    `;
    panel.classList.add('open');
    _renderMilestones(currentProvider, tree, null, null);
    return;
  }

  if(!n.api){ panel.classList.remove('open'); return; }

  // Date window ±5 months around launch for contextual milestones
  const launchYear=parseInt((n.sub||'').match(/\d{4}/)?.[0]||'0');
  const launchMonth=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    .findIndex(m=>(n.sub||'').includes(m));
  let dateFrom=null, dateTo=null;
  if(launchYear>2010){
    const d=new Date(launchYear,launchMonth>=0?launchMonth:0,1);
    d.setMonth(d.getMonth()-5); dateFrom=d.toISOString().slice(0,10);
    const d2=new Date(launchYear,launchMonth>=0?launchMonth:0,1);
    d2.setMonth(d2.getMonth()+5); dateTo=d2.toISOString().slice(0,10);
  }

  // Capability badges row
  const caps = CAPS[n.id];
  const speedColor = !caps ? '#7aa8e0' : caps.speed==='Fast' ? '#6ee7b7' : caps.speed==='Slow' ? '#fca5a5' : '#93c5fd';
  const speedBg   = !caps ? 'rgba(40,80,180,.2)' : caps.speed==='Fast' ? 'rgba(16,185,129,.2)' : caps.speed==='Slow' ? 'rgba(239,68,68,.18)' : 'rgba(59,130,246,.2)';
  const capBadgesHtml = caps ? [
    `<span style="font-size:9px;padding:2px 8px;border-radius:9px;background:rgba(40,80,180,.2);color:#7dd3fc;border:1px solid rgba(40,80,200,.35);white-space:nowrap">📏 ${caps.ctx}</span>`,
    `<span style="font-size:9px;padding:2px 8px;border-radius:9px;background:${speedBg};color:${speedColor};border:1px solid ${speedColor}44;white-space:nowrap">⚡ ${caps.speed}</span>`,
    ...caps.caps.map(c=>{const d=CAP_DEF[c]; return `<span style="font-size:9px;padding:2px 7px 2px 5px;border-radius:9px;background:${d.bg};color:${d.color};border:1px solid ${d.border};white-space:nowrap;display:inline-flex;align-items:center;gap:2px"><span>${d.icon}</span><span>${d.label}</span></span>`;})
  ].join('') : '';
  const capRow = capBadgesHtml ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid rgba(40,80,180,.18)">${capBadgesHtml}</div>` : '';

  const ucSection = uc ? `
    <div class="usecase-section">
      <div class="usecase-title">Decision Guide</div>
      ${capRow}
      <div class="uc-grid">${uc.chips.map(([label,cls])=>`<span class="uc-chip ${cls}">${label}</span>`).join('')}</div>
      <div class="choose-when">✓ Use when: ${uc.when}</div>
      <div class="skip-if" style="margin-top:5px">✗ Skip if: ${uc.skip}</div>
    </div>` : (feats.length?`<div class="detail-feats" style="margin-top:8px">${feats.map(f=>`<span class="dfeat">⬡ ${f}</span>`).join('')}</div>`:'');

  inner.innerHTML=`
    <div style="min-width:170px">
      <div class="detail-name">${n.label.replace('\n',' ')}</div>
      <div class="detail-api">${n.api}</div>
      <span class="detail-tier" style="color:${tc};border-color:${tc}">${n.tier||'model'}</span>
    </div>
    <div class="detail-stats">
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.gpqa&&n.gpqa!=='—'?n.gpqa+'%':'—'}</div><div class="dstat-lbl">GPQA</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.heval&&n.heval!=='—'?n.heval+'%':'—'}</div><div class="dstat-lbl">HumanEval</div></div>
      <div class="dstat"><div class="dstat-val" style="color:${tc}">${n.price?'$'+n.price+'/M':'—'}</div><div class="dstat-lbl">Output price</div></div>
    </div>
    ${ucSection}
    <div class="mile-section">
      <div class="mile-section-title">📡 Context at launch</div>
      <div class="mile-list" id="mile-list"><div class="mile-loading">Fetching…</div></div>
    </div>
    <button class="close-btn" onclick="zoomOut()" title="Close">×</button>
  `;
  panel.classList.add('open');
  _renderMilestones(currentProvider, tree, dateFrom, dateTo);
}

async function _renderMilestones(provKey, tree, dateFrom, dateTo){
  const list = document.getElementById('mile-list');
  if(!list) return;
  try {
    let rows = await getMilestones(provKey);
    // Filter by date range if provided (model context window)
    if(dateFrom && dateTo){
      rows = rows.filter(m=>m.date>=dateFrom && m.date<=dateTo);
      if(!rows.length){
        // Fall back to top 6 high-signal milestones if no date match
        rows = [..._mileCache[Object.keys(_mileCache).at(-1)]||[]]
          .sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0))
          .slice(0,6);
      }
    } else {
      // Company root: show top 12 by score
      rows = [...rows].sort((a,b)=>(b.forward_implication_score||0)-(a.forward_implication_score||0)).slice(0,12);
    }
    if(!rows.length){ list.innerHTML='<div class="mile-loading">No milestones found</div>'; return; }

    list.innerHTML = rows.map(m=>{
      const cc = claimColor(m.claim_type);
      const score = m.forward_implication_score;
      const scoreDots = score ? '◆'.repeat(score)+'◇'.repeat(5-score) : '';
      const tags = (m.tags||[]).slice(0,3).map(t=>`<span class="mile-chip">${t}</span>`).join('');
      return `<div class="mile-item" style="border-color:${cc}20;border-left-color:${cc}">
        <div class="mile-date">${(m.date||'').slice(0,7)} ${m.claim_type?`<span style="color:${cc};font-size:9px">${m.claim_type}</span>`:''} ${score?`<span style="color:#334155;letter-spacing:1px;font-size:8px">${scoreDots}</span>`:''}</div>
        <div class="mile-evt">${m.event||''}</div>
        ${m.significance?`<div class="mile-sig">${m.significance}</div>`:''}
        ${tags?`<div class="mile-chips">${tags}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){
    if(list) list.innerHTML=`<div class="mile-loading" style="color:#ef4444">Could not load — ${e.message}</div>`;
  }
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  PROVIDER SWITCH
// ═══════════════════════════════════════════════════════════
function setProvider(key, btn){
  if(currentProvider===key) return;
  currentProvider=key; isZoomed=false; selectedNodeId=null;
  currentVB=[...VB_FULL];

  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  svg.style.filter='blur(8px)';
  closeDetail();

  setTimeout(()=>{
    svg.style.filter='none';
    svg.style.transition='filter .5s';
    drawTree(key, true);
    currentVB=[...VB_FULL];
    svg.setAttribute('viewBox',VB_FULL.join(' '));
  },350);
}

  ctx.clearRect(0,0,canvas.width,canvas.height);

}
